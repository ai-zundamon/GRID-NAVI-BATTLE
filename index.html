<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRID NAVI BATTLE V15</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    width:100%; height:100%; overflow:hidden;
    background:#06070e;
    font-family:'Courier New', monospace;
    color:#cfe;
    touch-action:none; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center;
  }
  #stage { display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; }
  #topbar { width:100%; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  #topbar button {
    background:rgba(10,18,32,0.82); border:1px solid #2f4a72; color:#bfe3ff; border-radius:6px;
    font-family:inherit; font-weight:bold; font-size:11px; padding:5px 8px; cursor:pointer; touch-action:none;
  }
  #topbar button:active { background:#2e69b0; color:#fff; }
  #mute { margin-left:auto; }
  #game {
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#04050a;
    border:2px solid #1b2b44;
    box-shadow:0 0 26px rgba(40,120,200,0.28);
    display:block;
  }
  #pad { width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .cluster { display:flex; }
  .dpad { display:grid; grid-template-columns:repeat(3, 54px); grid-template-rows:repeat(3, 54px); gap:3px; }
  .btn {
    background:#16243c; border:1px solid #2f4a72; color:#bfe3ff; border-radius:7px;
    font-family:inherit; font-weight:bold; font-size:14px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; touch-action:none;
    transition:background .05s;
  }
  .btn:active, .btn.on { background:#2e69b0; color:#fff; }
  .dpad .btn { width:54px; height:54px; font-size:22px; }
  .dpad .empty { visibility:hidden; }
  .acts { display:flex; gap:8px; align-items:flex-end; }
  .abtn { width:62px; height:62px; border-radius:50%; font-size:16px; flex-direction:column; }
  .abtn small { font-size:9px; opacity:.7; }
  .abtn.cust { width:58px; height:58px; background:#3a2a4e; border-color:#6a4a8a; color:#e6c8ff; }
  .abtn.cust:active { background:#7a4ab0; }
  .abtn.chip { background:#143a30; border-color:#2f7a5a; color:#bfffe0; }
  .abtn.chip:active { background:#2aa070; }
  .hint { font-size:11px; color:#5a7090; text-align:center; margin-top:2px; letter-spacing:.5px; }
</style>
</head>
<body>
<div id="stage">
  <div id="topbar">
    <button id="fxbtn" type="button">FX:ON</button>
    <button id="shakebtn" type="button">SHAKE:STRONG</button>
    <button id="mute" type="button">BGM: ON</button>
  </div>
  <canvas id="game" width="384" height="232"></canvas>
  <div id="pad">
    <div class="cluster">
      <div class="dpad">
        <div class="empty"></div><div class="btn" data-dir="up">▲</div><div class="empty"></div>
        <div class="btn" data-dir="left">◀</div><div class="empty"></div><div class="btn" data-dir="right">▶</div>
        <div class="empty"></div><div class="btn" data-dir="down">▼</div><div class="empty"></div>
      </div>
    </div>
    <div class="cluster acts">
      <div class="btn abtn cust" data-act="cust">CUST<small>カスタム</small></div>
      <div class="btn abtn chip" data-act="chip">CHIP<small>使用</small></div>
      <div class="btn abtn" data-act="buster">B<small>ショット</small></div>
    </div>
  </div>
  <div class="hint">PC: 移動=方向/WASD ・ ショット=Z ・ チップ=X ・ カスタム=C</div>
</div>

<script>
"use strict";
(function(){

const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const VW = 384, VH = 232;
let RS = 1;                       // 内部レンダースケール（論理1px→バッキングRS px）。視認性向上の要。
const COLS = 6, ROWS = 3;
const PLAYER_COLS = 3;

/* ============================ レスポンシブ ============================ */
function fitCanvas(){
  const pad = document.getElementById('pad');
  const padH = 176;
  const availW = Math.max(200, window.innerWidth - 16);
  const topH = 40;                                     // 上部設定バー(FX/SHAKE/BGM)の高さ確保
  const availH = Math.max(200, window.innerHeight - padH - topH - 24);
  let disp = Math.floor(Math.min(availW / VW, availH / VH));
  disp = Math.max(1, Math.min(6, disp));               // 画面表示の整数倍率（従来どおり）
  const dpr = window.devicePixelRatio || 1;
  const dprMul = dpr >= 1.5 ? 2 : 1;                   // 高精細ディスプレイでは内部解像度を更に2倍
  RS = disp * dprMul;                                  // 論理→内部の拡大率（描画は論理座標のまま行う）
  cv.width  = Math.round(VW * RS);                     // バッキングストアを高解像度化＝にじみ解消
  cv.height = Math.round(VH * RS);
  cv.style.width  = (VW * disp) + 'px';                // 表示サイズは従来と同一（当たり判定・座標系は不変）
  cv.style.height = (VH * disp) + 'px';
  pad.style.maxWidth = (VW * disp) + 'px';
  const tb=document.getElementById('topbar'); if(tb) tb.style.maxWidth = (VW * disp) + 'px';
  ctx.imageSmoothingEnabled = false;                   // canvasリサイズで解除されるため毎回再設定
}
window.addEventListener('resize', fitCanvas);

/* ============================ ユーティリティ ============================ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rint=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const choice=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nowS(){ return performance.now()/1000; }

const GLYPH = {};
(function buildFont(){
  for (const k in RAW){
    GLYPH[k] = RAW[k].map(r => (r + '.....').slice(0,5));

})();
function bsnap(v){ return Math.round(v*RS)/RS; }   // 内部解像度グリッドへ吸着＝デバイス整数画素に整列（にじみ/潰れ防止）
function btext(str, x, y, scale, color, align, shadow){
  str = (''+str).toUpperCase();
  const cw=5, gap=1, adv=(cw+gap)*scale;
  const width = str.length*adv - gap*scale;
  let sx0 = x;
  if (align==='center') sx0 = x - width/2;
  else if (align==='right') sx0 = x - width;
  const blk = Math.max(1/RS, Math.round(scale*RS)/RS);   // ドット1個のサイズを内部解像度の整数画素に丸める
  if (shadow){
    ctx.fillStyle = '#000';
    let sx = sx0;
    for (let n=0;n<str.length;n++){
      const g = GLYPH[str[n]] || GLYPH['?'];
      for (let r=0;r<7;r++){ const row=g[r];
        for (let i=0;i<5;i++){ if(row[i]==='#'){ ctx.fillRect(bsnap(sx+i*scale+scale), bsnap(y+r*scale+scale), blk, blk); } }
      }
      sx += adv;
    }
  }
  ctx.fillStyle = color;
  let sx = sx0;
  for (let n=0;n<str.length;n++){
    const g = GLYPH[str[n]] || GLYPH['?'];
    for (let r=0;r<7;r++){ const row=g[r];
      for (let i=0;i<5;i++){ if(row[i]==='#'){ ctx.fillRect(bsnap(sx+i*scale), bsnap(y+r*scale), blk, blk); } }
    }
    sx += adv;
  }
}
function btextWidth(str,scale){ return (''+str).length*((5+1)*scale) - 1*scale; }
/* 日本語など非ASCII用。実フォント(ゴシック体)＋高解像度バッキングで鮮明描画 */
const JP_FONT = '"Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo","Noto Sans CJK JP","MS PGothic",sans-serif';
function jtext(str,x,y,col,size,align,weight){
  const sz=size||9;
  ctx.font=(weight?weight+' ':'')+sz+'px '+JP_FONT;
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#04060c'; ctx.fillText(str,x+0.6,y+0.7);   // 細い影で背景から分離し可読性を確保
  ctx.fillStyle=col||'#cfe'; ctx.fillText(str,x,y);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

/* ============================ バランス定数 ============================ */

function ruleValid(list){
  if (list.length<=1) return true;
  if (list.every(c=>c.id===list[0].id)) return true;
  const codes=list.map(c=>c.code).filter(c=>c!=='*');
  if (codes.length===0) return true;
  return codes.every(c=>c===codes[0]);
}

const SAVE_KEY = 'gnb_save_v7';
let BEST_TABLE = { EASY:0, NORMAL:0, HARD:0 };          // 難易度別ベストスコア
let RANK_TABLE = { EASY:'-', NORMAL:'-', HARD:'-' };    // 難易度別ベスト・バスティングランク
let DISCOVERED = {};                                    // 入手済みチップ { id:true }
let NEWLY = {};                                         // 図鑑で未確認の新規入手チップ { id:true }
let EX_UNLOCKED = false;                                // EXボス(OMEGA)解放フラグ（初回クリアで true）
let BEST_EX = { EASY:0, NORMAL:0, HARD:0 };             // EX(2体連戦)専用ベストスコア(P2：通常と別枠)
let RANK_EX = { EASY:'-', NORMAL:'-', HARD:'-' };       // EX専用ベスト・バスティングランク(P2)
let ACH_DONE = {};                                      // 解放済み実績 { id:true }(P4)
const SET = { fx:true, shake:1 };                       // 演出設定 shake:1=強/0.5=弱/0=なし
const RANK_ORDER = { 'S+':5, S:4, A:3, B:2, C:1, '-':0 };  // S+ ＝最上位(全項目◎+無敗)(P1)
/* 実績(メダル)定義(P4)：全難易度・EX・無傷・PERFECT・図鑑・やり込みへの動機づけ */
const ACHIEVEMENTS = [
  { id:'clearE',   name:'EASY CLEAR',   jp:'EASYクリア',   desc:'EASYでボスを撃破' },
  { id:'clearN',   name:'NORMAL CLEAR', jp:'NORMALクリア', desc:'NORMALでボスを撃破' },
  { id:'clearH',   name:'HARD CLEAR',   jp:'HARDクリア',   desc:'HARDでボスを撃破' },
  { id:'clearEX',  name:'EX OMEGA',     jp:'EX OMEGA撃破', desc:'EXモードでOMEGAを撃破' },
  { id:'flawless', name:'FLAWLESS',     jp:'無傷クリア',   desc:'被弾0でクリア' },
  { id:'perfect',  name:'PERFECT RANK', jp:'PERFECT評価',  desc:'ランクS+(全項目◎)を獲得' },
  { id:'master',   name:'DATA MASTER',  jp:'図鑑コンプ',   desc:'全12チップを収集' },
  { id:'paAdept',  name:'P.A. ADEPT',   jp:'P.A.の使い手', desc:'1ラン中にP.A.を3回使用' },
  { id:'chainer',  name:'CHAIN MASTER', jp:'連鎖の達人',   desc:'コンボ x5 以上を達成' }
];
function achCount(){ let n=0; for(const a of ACHIEVEMENTS) if(ACH_DONE[a.id]) n++; return n; }
function unlockAch(id){ if(id && !ACH_DONE[id]){ ACH_DONE[id]=true; saveAll(); if(!G._newAch) G._newAch=[]; G._newAch.push(id); } } // 新規解放を保持(リザルト通知用)
(function loadSave(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw){ const o = JSON.parse(raw);
      if(o && typeof o==='object'){
        if(o.best) for(const k of ['EASY','NORMAL','HARD']){ if(typeof o.best[k]==='number' && o.best[k]>=0) BEST_TABLE[k]=o.best[k]|0; }
        if(o.rank) for(const k of ['EASY','NORMAL','HARD']){ if(typeof o.rank[k]==='string') RANK_TABLE[k]=o.rank[k]; }
        if(o.bestEx) for(const k of ['EASY','NORMAL','HARD']){ if(typeof o.bestEx[k]==='number' && o.bestEx[k]>=0) BEST_EX[k]=o.bestEx[k]|0; }   // EX別枠ベスト(P2)
        if(o.rankEx) for(const k of ['EASY','NORMAL','HARD']){ if(typeof o.rankEx[k]==='string') RANK_EX[k]=o.rankEx[k]; }                       // EX別枠ランク(P2)
        if(o.disc && typeof o.disc==='object'){ for(const id in o.disc){ if(o.disc[id]===true) DISCOVERED[id]=true; } }
        if(o.newly && typeof o.newly==='object'){ for(const id in o.newly){ if(o.newly[id]===true) NEWLY[id]=true; } }
        if(o.ach && typeof o.ach==='object'){ for(const id in o.ach){ if(o.ach[id]===true) ACH_DONE[id]=true; } }                                // 実績(P4)
        if(typeof o.ex==='boolean') EX_UNLOCKED=o.ex;
        if(o.set){ if(typeof o.set.fx==='boolean') SET.fx=o.set.fx; if(typeof o.set.shake==='number') SET.shake=o.set.shake; }
      } }
  }catch(e){ /* 使用不可 → セッション内のみ */ }
})();
function saveAll(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({best:BEST_TABLE,rank:RANK_TABLE,bestEx:BEST_EX,rankEx:RANK_EX,disc:DISCOVERED,newly:NEWLY,ach:ACH_DONE,ex:EX_UNLOCKED,set:{fx:SET.fx,shake:SET.shake}})); }catch(e){} }
function discover(id){ if(id && !DISCOVERED[id]){ DISCOVERED[id]=true; NEWLY[id]=true; saveAll(); if(libComplete()) unlockAch('master'); } } // 図鑑コンプで実績(P4)
function libCount(){ let n=0; for(const id of Object.keys(CHIPS)) if(DISCOVERED[id]) n++; return n; }
function libComplete(){ return libCount()>=Object.keys(CHIPS).length; }
function clearNewly(){ let ch=false; for(const id in NEWLY){ delete NEWLY[id]; ch=true; } if(ch) saveAll(); } // 図鑑確認で「NEW!」を消す
/* 演出設定ヘルパ：fxがOFFなら停止系を全て無効化（全機能は通常動作） */
function hs(v){ return SET.fx ? v : 0; }          // ヒットストップ
function fl(v){ return SET.fx ? v : 0; }          // 画面フラッシュ
let BEST_SCORE = 0; // 現在プレイ中の難易度のベスト（startGameで設定）
function isExRun(){ return G.finalWave===5; }          // EXラン＝OMEGA(=wave5)到達構成(P2)
function curBestTable(){ return isExRun()?BEST_EX:BEST_TABLE; } // 系列別ベスト表(通常/EX)
function curRankTable(){ return isExRun()?RANK_EX:RANK_TABLE; } // 系列別ランク表(通常/EX)
function commitBest(score){ // 現在系列(通常/EX)のベストを更新。更新できたら true（NEW BEST）(P2)
  const d = G.diffName || 'NORMAL'; const tbl = curBestTable();
  let isNew=false;
  if(score > (tbl[d]||0)){ tbl[d]=score; BEST_SCORE=score; isNew=true; }
  else BEST_SCORE = Math.max(BEST_SCORE, tbl[d]||0);
  saveAll();
  return isNew;
}
function commitRank(rk){ // 現在系列(通常/EX)のベストランクを更新（より高いランクのみ）(P2)
  const d = G.diffName || 'NORMAL'; const tbl = curRankTable();
  if((RANK_ORDER[rk]||0) > (RANK_ORDER[tbl[d]]||0)){ tbl[d]=rk; saveAll(); }
}
function rankFor(score){
  if(score>=4200) return {r:'S', col:'#ffe23c'};
  if(score>=3400) return {r:'A', col:'#7df0ff'};
  if(score>=2600) return {r:'B', col:'#7dff9a'};
  return {r:'C', col:'#bfe3ff'};
}
function rankColor(r){ return r==='S+'?'#fff5c0':r==='S'?'#ffe23c':r==='A'?'#7df0ff':r==='B'?'#7dff9a':r==='C'?'#bfe3ff':'#6f8aa8'; }
function gradeCol(g){ return g==='◎'?'#ffe23c':(g==='○'?'#7df0ff':'#8fa0b8'); } // 内訳グレード色(◎金/○水/△灰)
/* バスティング評価：被ダメージ(少◎)・カウンター数(多◎)・クリアタイム(速◎)を総合し、
   内訳(◎/○/△)と「次に改善すべき点」のヒントを返す。クリア(VICTORY)時のみ算出される＝
   失敗(GAME OVER)では決して S〜C が付かない。さらに S は「ノーコンティニュー」を必須とする。 */
function clearReport(){
  const dmg  = G.runDamage   || 0;
  const cnt  = G.runCounters || 0;
  const pa   = G.runPA       || 0;
  const cmb  = G.runMaxCombo || 0;
  const time = Math.max(1, (G.time - (G.runStart||0)));   // 下限1秒：極端値でもゼロ除算・破綻なし(P1)
  // 各軸グレード（◎=優 / ○=良 / △=改善余地）。閾値を明示定義(P1)
  const gDmg  = dmg<=120 ? '◎' : (dmg<=300 ? '○' : '△');  // 被弾：少ないほど良い
  const gCnt  = cnt>=6   ? '◎' : (cnt>=3   ? '○' : '△');  // カウンター：多いほど良い
  const gTime = time<=130? '◎' : (time<=200? '○' : '△');  // タイム：速いほど良い
  const gPA   = pa>=2    ? '◎' : (pa>=1    ? '○' : '△');  // P.A.：使うほど良い
  const gCmb  = cmb>=4   ? '◎' : (cmb>=2   ? '○' : '△');  // コンボ：高いほど良い
  // 内訳5軸を点数化(◎=2/○=1/△=0)→合計(最大10)から総合ランク決定(P1：内訳に連動)
  const gr = g => (g==='◎'?2:(g==='○'?1:0));
  const score10 = gr(gDmg)+gr(gCnt)+gr(gTime)+gr(gPA)+gr(gCmb);
  const allPerfect = (gDmg==='◎'&&gCnt==='◎'&&gTime==='◎'&&gPA==='◎'&&gCmb==='◎');
  // ランク決定（クリア前提）。S+ は「全項目◎ かつ ノーコンティニュー」が必須。
  let rank, capped=false;
  if(allPerfect && !G.usedContinue) rank='S+';
  else if(score10>=8) rank='S';
  else if(score10>=6) rank='A';
  else if(score10>=3) rank='B';
  else rank='C';
  if((rank==='S+'||rank==='S') && G.usedContinue){ rank='A'; capped=true; } // コンティニュー使用は最上位不可
  // 改善ヒント（最も弱い軸の「次の目標」を数値で提示）(V10 P2)
  let tip; const tCeil=Math.ceil(time);
  if(gDmg==='△')      tip='TIP: 被弾をあと'+(dmg-300)+'軽減で○へ';
  else if(gCnt==='△') tip='TIP: あとCOUNTER '+(3-cnt)+'回で○へ';
  else if(gTime==='△')tip='TIP: あと'+(tCeil-200)+'秒短縮で○へ';
  else if(gPA==='△')  tip='TIP: P.A.を1回決めると○へ';
  else if(gCmb==='△') tip='TIP: 同名チップ連続でCOMBO X2 → ○へ';
  else if(capped)     tip='TIP: ノーコンティニュー(無敗)でS+到達';
  else if(rank!=='S+'){                                  // 全項目○以上 → 最も近い◎昇格を案内
    if(gDmg==='○')      tip='TIP: 被弾 '+dmg+'→120以下で◎へ';
    else if(gCnt==='○') tip='TIP: COUNTER '+cnt+'→6回で◎へ';
    else if(gTime==='○')tip='TIP: タイム '+tCeil+'→130秒以下で◎へ';
    else if(gPA==='○')  tip='TIP: P.A.を計2回決めると◎へ';
    else if(gCmb==='○') tip='TIP: COMBO X4 で◎へ';
    else                tip='TIP: 全項目◎+無敗でS+(PERFECT)へ';
  }
  else                tip='PERFECT! 全項目◎の完璧なプレイ';
  return { rank, score10, gDmg, gCnt, gTime, gPA, gCmb, dmg, cnt, pa, cmb, time, allPerfect, capped, tip };
}

/* ============================ 透視グリッド ============================ */
const FIELD={ tl:{x:70,y:64}, tr:{x:314,y:64}, bl:{x:26,y:182}, br:{x:358,y:182} };
function fieldPoint(u,v){
  const tx=lerp(FIELD.tl.x,FIELD.tr.x,u), bx=lerp(FIELD.bl.x,FIELD.br.x,u);
  return { x:lerp(tx,bx,v), y:lerp(FIELD.tl.y,FIELD.bl.y,v) };
}
function cellCenter(c,r){ return fieldPoint((c+0.5)/COLS,(r+0.5)/ROWS); }
function fxPoint(fx,r){ return fieldPoint(fx/COLS,(r+0.5)/ROWS); }

/* ============================ フィールド ============================ */
function buildField(cracks,ices){
  G.panels=[];
  for(let r=0;r<ROWS;r++){ const row=[]; for(let c=0;c<COLS;c++) row.push({type:'normal',regen:0}); G.panels.push(row); }
  if(cracks) for(const [c,r] of cracks){ if(G.panels[r]&&G.panels[r][c]) G.panels[r][c].type='crack'; }
  if(ices)   for(const [c,r] of ices){ if(G.panels[r]&&G.panels[r][c]) G.panels[r][c].type='ice'; }
  G.playerMaxCol=PLAYER_COLS-1; G.enemyMinCol=PLAYER_COLS;
}
function panelAt(c,r){ if(c<0||c>=COLS||r<0||r>=ROWS) return null; return G.panels[r][c]; }
function standable(c,r){ const p=panelAt(c,r); return !!p && p.type!=='hole'; }

/* ============================ 敵生成 / ウェーブ ============================ */
function makeEnemy(type,col,row,hpMul,aggro){
  const d=ENEMY_DEF[type];
  const hpScale=isBossType(type)?DIFF.bossHp:DIFF.hp;
  const hp=Math.round(d.hp*(hpMul||1)*hpScale);
  const ag=(aggro||1)*DIFF.aggro;
  const e={ type,col,row,hp,maxHp:hp,flash:0,dead:false,invuln:false,home:col,stun:0,
            t:Math.random()*1.0,phase:'idle',moveCd:0,bossAtkIndex:0,phase2:false,
            attackTimer:0,aggro:ag,bob:Math.random()*6 };
  if(type==='crawler'){ e.phase='visible'; e.t=0.6+Math.random()*0.7; }
  if(type==='blade'){ e.phase='wander'; e.t=0.7+Math.random()*0.7; }
  if(type==='mortar'){ e.phase='idle'; e.t=(0.9+Math.random()*0.9)*e.aggro; }
  if(type==='boss'){ e.phase='recover'; e.t=1.0; }
  if(type==='omega'){ e.phase='recover'; e.t=1.0; }
  return e;
}
function makeWaveEnemies(w){
  if(w===1) return [ makeEnemy('crawler',4,0), makeEnemy('crawler',4,2) ];
  if(w===2) return [ makeEnemy('turret',5,1), makeEnemy('blade',4,2), makeEnemy('crawler',4,0) ];
  if(w===3) return [ makeEnemy('mortar',5,0,1.12,0.85), makeEnemy('mortar',5,2,1.12,0.85),
                     makeEnemy('turret',4,1,1.12,0.85), makeEnemy('blade',5,1,1.12,0.85) ];
  if(w===4) return [ makeEnemy('boss',4,1) ];
  if(w===5) return [ makeEnemy('omega',4,1) ];   // EXボス
  return [];
}
function isBossWave(w){ return w===4||w===5; }   // ボスが登場するウェーブ
function waveCracks(w){ if(w===3) return [[2,0]]; if(w===4) return [[2,1],[1,2]]; if(w===5) return [[4,0],[4,2]]; return []; } // OMEGAは敵陣のみ(自陣は事故防止で地形なし)
function waveIces(w){ if(w===3) return [[1,0],[1,1]]; return []; }

function startGame(){
  DIFF = DIFFS[ DIFF_ORDER[G.diffIndex] ] || DIFFS.NORMAL;
  G.diffName = DIFF.name;
  G.finalWave = (G.exMode && EX_UNLOCKED) ? 5 : TOTAL_WAVES; // EXモードはOMEGA(=5)まで(先に決定→ベスト系列を正しく参照)
  G.lastBossName = (G.finalWave===5) ? 'OMEGA' : 'INFERNO';
  BEST_SCORE = curBestTable()[DIFF.key] || 0; // 現在系列(通常/EX)の保存済みベストを表示基準に(P2)
  G.score = 0;
  G.runStart = G.time;
  G.runDamage = 0; G.runCounters = 0; G.bustRank='-';
  G.runPA = 0; G.runMaxCombo = 0; G.usedContinue = false;   // ラン単位の統計をリセット
  G._newAch = [];                                           // 今回ラン新規解放実績(P4)
  G.cutin = null; G.furyT = 0;
  G.folder = BASE_FOLDER.slice();
  startWave(1);
}
function startWave(w){
  G.wave=w;
  G._waveStartScore = G.score; // このウェーブ開始時点のスコア（リトライ時の巻き戻し用）
  buildField(waveCracks(w),waveIces(w));
  G.p.col=0; G.p.row=1; G.p.hp=PLAYER.maxHp;
  G.p.moveCd=0; G.p.iframe=0; G.p.flash=0; G.p.busterCd=0; G.p.charge=0; G.p.charging=false;
  busterDown=false;
  G.enemies=makeWaveEnemies(w);
  G.shots=[]; G.strikes=[]; G.mines=[]; G.fx=[]; G.floats=[]; G.embers=[];
  G.queue=[]; G.comboId=null; G.comboCount=0;
  G.chain=0; G.chainT=0; G._newBest=false;
  G.cutin=null; G.furyT=0;
  G.outroKind=null; G.outroT=0;
  G.customGauge=CUSTOM_FILL; G.customReady=true;
  G.hitstop=0; G.shake=0; G.flashScreen=0;
  bgmStart(isBossWave(w));
  enterCustom(true);
}

/* ============================ カスタム画面 ============================ */
function enterCustom(initial){
  if(!initial && (G.state!==ST.BATTLE || G.outroKind)) return; // アウトロ中/戦闘外からは開かない
  G.initialCustom=!!initial;
  G.hand = shuffle(G.folder).slice(0,8).map(([id,code])=>({id,code}));
  G.selected=[]; G.cursor=0; G.state=ST.CUSTOM; G.stateT=0;
  beep(560,0.05); beep(760,0.06);
}
function selectedChips(){ return G.selected.map(i=>({id:G.hand[i].id,code:G.hand[i].code})); }
function canAddIndex(i){
  if(G.selected.includes(i)) return false;
  if(G.selected.length>=5) return false;
  return ruleValid(selectedChips().concat([{id:G.hand[i].id,code:G.hand[i].code}]));
}
function toggleSelect(i){
  const pos=G.selected.indexOf(i);
  if(pos>=0){ G.selected.splice(pos,1); beep(420,0.04); return; }
  if(canAddIndex(i)){ G.selected.push(i); beep(720,0.05); }
  else beep(170,0.06,'square');
}
function confirmCustom(){
  const sel=selectedChips();
  for(const c of sel) discover(c.id); // 使用チップを図鑑に記録
  const pa=detectPA(sel);
  G.queue = pa ? [{pa}] : sel;
  G.customGauge=0; G.customReady=false;
  G.state=ST.BATTLE; G.stateT=0;
  if(pa) beep(1300,0.1,'sawtooth');
  beep(900,0.08); beep(1200,0.06);
}

/* ============================ チップ効果 ============================ */
/* --- プログラムアドバンス（特定の組み合わせで必殺技） --- */
const PA_NAMES={ PULSE:'GIGA CANNON', RAPID:'VULCAN STORM', BLADE:'BLADE STORM', WIDE:'WIDE BLITZ',
  LONG:'LONG BLITZ', SURGE:'OMEGA WAVE', RAIN:'METEOR FALL', CLUSTER:'CLUSTER HELL', BACK:'CROSS RAVE' };
const PA_DMG={ PULSE:62, RAPID:50, BLADE:70, WIDE:70, LONG:92, SURGE:70, RAIN:60, CLUSTER:66, BACK:80 };
function paFxFor(cat){ return cat==='blade'||cat==='back'?'slash':cat==='bomb'?'bomb':'meteor'; }
function detectPA(sel){
  if(sel.length>=3 && sel.every(c=>c.id===sel[0].id) && PA_NAMES[sel[0].id]){
    const id=sel[0].id; return {name:PA_NAMES[id],dmg:PA_DMG[id],col:CHIPS[id].col,fx:paFxFor(CHIPS[id].cat)};
  }
  const ids=sel.map(c=>c.id).sort().join(',');
  if(sel.length===3 && ids==='BLADE,LONG,WIDE') return {name:'DELTA EDGE',kind:'delta',col:'#7df0ff'};
  return null;
}
/* --- P.A.成立機会の解析（V10：可視化のため、現在の手札から「組めるP.A.」を割り出す） ---
   detectPA は「選択済みチップ」が既にP.A.かを判定するのに対し、ここでは「手札全体」を見て
   どの組み合わせを選べばP.A.になるかを事前に提示する。DELTA(BLADE+WIDE+LONG)は選択ルール
   (ruleValid＝同コード/万能)を満たす三枚が手札に揃っている場合のみ成立対象とする。 */
function findDeltaTrio(B,W,L){
  for(const bi of B) for(const wi of W) for(const li of L){
    if(ruleValid([G.hand[bi],G.hand[wi],G.hand[li]])) return [bi,wi,li];
  }
  return null;
}
function analyzeHandPA(){
  const list=[], cardSet=new Set();
  const byId={};
  G.hand.forEach((h,i)=>{ (byId[h.id]=byId[h.id]||[]).push(i); });
  for(const id in byId){
    if(byId[id].length>=3 && PA_NAMES[id]){              // 同名3枚以上 → 同名P.A.
      list.push({type:'same', id, name:PA_NAMES[id], idx:byId[id].slice()});
      byId[id].forEach(i=>cardSet.add(i));
    }
  }
  const trio=findDeltaTrio(byId['BLADE']||[],byId['WIDE']||[],byId['LONG']||[]);
  if(trio){ list.push({type:'delta', name:'DELTA EDGE', idx:trio}); trio.forEach(i=>cardSet.add(i)); }
  return {list, cardSet};
}
/* この手札インデックスを今の選択に加えると、選択がP.A.として成立するか（＝「あと一枚で完成」） */
function wouldCompletePA(i){
  if(G.selected.includes(i) || !canAddIndex(i)) return false;
  const trial=selectedChips().concat([{id:G.hand[i].id,code:G.hand[i].code}]);
  return !!detectPA(trial);
}
function paCells(){ const cells=[]; for(let c=G.enemyMinCol;c<COLS;c++) for(let r=0;r<ROWS;r++) cells.push([c,r]); return cells; }
function doPA(pa){
  G.runPA++;                                  // P.A.使用回数(リザルト内訳用)
  const mid=(G.enemyMinCol+COLS-1)/2;
  // 技名カットイン（バトルは進行＝敵処理・撃破判定・ウェーブ進行は停止しない）
  G.cutin = { name:pa.name, col:pa.col||'#ff5af0', t:0, life:0.8 };
  G.p.iframe = Math.max(G.p.iframe, 0.5); // 演出中は無敵
  G.flashScreen=fl(0.3); G.hitstop=Math.max(G.hitstop,hs(0.13)); G.shake=Math.max(G.shake,0.5);
  beep(1500,0.18); beep(900,0.16,'sawtooth'); beep(1800,0.1);
  addFx('pa',cellCenter(mid,1),'#ff5af0',0.7);
  const PA_BONUS=250; G.score+=PA_BONUS;                         // V10：P.A.成功への明確なスコア報酬
  addFloat('P.A. +'+PA_BONUS, cellCenter(mid,-0.3), '#ff9ae0', 1.7, 1.1);
  let cells,dmg,kind,warn;
  if(pa.kind==='delta'){ cells=[]; for(const c of [G.enemyMinCol,Math.min(COLS-1,G.enemyMinCol+1)]) for(let r=0;r<ROWS;r++) cells.push([c,r]);
    dmg=75; kind='slash'; warn=0.1; }
  else { cells=paCells(); dmg=pa.dmg; kind=pa.fx; warn=0.18; }
  addStrike({owner:'p',cells,warn,hit:0.3,dmg,kind,col:pa.col||'#ff5af0',stun:0.6});
}
function spawnShot(opt){
  G.shots.push(Object.assign({owner:'p',fx:0,row:G.p.row,vx:BUSTER.vx,dmg:BUSTER.dmg,
    pierce:false,hitSet:new Set(),kind:'buster',r:2,col:'#bfe9ff'},opt));
}
function applyChip(ch,mult){
  mult = mult||1;
  const def=CHIPS[ch.id], row=G.p.row, col=G.p.col;
  const D = v=>Math.round(v*mult);
  switch(def.cat){
    case 'shot':
      if(def.hits){ for(let k=0;k<def.hits;k++) spawnShot({fx:(col+0.5)-k*0.28,row,vx:BUSTER.vx+3,dmg:D(def.dmg),kind:'chip',col:def.col,r:2}); }
      else spawnShot({fx:col+0.6,row,vx:14,dmg:D(def.dmg),kind:'chip',col:def.col,r:3});
      break;
    case 'wave':
      spawnShot({fx:col+0.6,row,vx:11,dmg:D(def.dmg),pierce:true,kind:'wave',col:def.col,r:4});
      break;
    case 'blade':{
      const cells=[];
      if(def.id==='BLADE') cells.push([col+1,row]);
      if(def.id==='WIDE') for(let r=0;r<ROWS;r++) cells.push([col+1,r]);
      if(def.id==='LONG'){ cells.push([col+1,row]); cells.push([col+2,row]); }
      addStrike({owner:'p',cells,warn:0.05,hit:0.18,dmg:D(def.dmg),kind:'slash',col:def.col}); break;
    }
    case 'back':{ const cells=[]; for(let r=0;r<ROWS;r++) cells.push([5,r]);
      addStrike({owner:'p',cells,warn:0.1,hit:0.18,dmg:D(def.dmg),kind:'slash',col:def.col}); break; }
    case 'meteor':{ const occ=enemyOccupiedCells(); let t=(occ.length?occ:enemyCellsAll()); t=shuffle(t).slice(0,4);
      addStrike({owner:'p',cells:t,warn:0.6,hit:0.2,dmg:D(def.dmg),kind:'meteor',col:def.col}); break; }
    case 'bomb':{ const cx=clamp(col+2,0,COLS-1); const cells=[]; for(let r=0;r<ROWS;r++) cells.push([cx,r]);
      addStrike({owner:'p',cells,warn:0.45,hit:0.2,dmg:D(def.dmg),kind:'bomb',col:def.col}); break; }
    case 'trap':{ const cx=G.enemyMinCol; G.mines.push({col:cx,row,t:6.0,dmg:D(def.dmg),col_:def.col});
      addFx('spawn',cellCenter(cx,row),def.col,0.3); break; }
    case 'heal':{ const h=D(def.heal); G.p.hp=clamp(G.p.hp+h,0,PLAYER.maxHp);
      addFx('heal',playerFoot(),def.col,0.6); addFloat('+'+h,playerFoot(),'#7dff9a',1); beep(900,0.12); break; }
    case 'area':{ const before=G.playerMaxCol;
      G.playerMaxCol=Math.min(4,G.playerMaxCol+1); G.enemyMinCol=G.playerMaxCol+1;
      for(const e of G.enemies){ if(e.dead) continue; if(e.col<G.enemyMinCol){ e.col=Math.min(5,G.enemyMinCol);
        damageEnemy(e,D(def.dmg)); } }
      if(G.playerMaxCol!==before) addFx('area',cellCenter(G.playerMaxCol,1),def.col,0.4);
      beep(520,0.1); break; }
  }
  beep(760,0.05,'square');
}
function useNextChip(){
  if(G.state!==ST.BATTLE) return;
  if(G.outroKind) return;                       // アウトロ演出中は入力を受けない(多重発火防止)
  if(G.queue.length===0){ beep(160,0.05,'square'); return; }
  if(G._chipCd>0) return;
  const ch=G.queue.shift();
  if(ch.pa){ doPA(ch.pa); G.comboId=null; G.comboCount=0; G._chipCd=CHIP_USE_CD; return; }
  // 同名コンボ
  if(ch.id===G.comboId) G.comboCount++; else { G.comboId=ch.id; G.comboCount=1; }
  G.runMaxCombo=Math.max(G.runMaxCombo,G.comboCount);   // 最大コンボ(リザルト内訳用)
  let mult=1;
  if(G.comboCount>=2) mult=1+0.3*(G.comboCount-1);
  mult=Math.min(mult,2.2);
  applyChip(ch,mult);
  if(G.comboCount>=2){                                              // V10：コンボ継続への段階的スコア報酬＋表記の明確化
    const cb=40*(G.comboCount-1); G.score+=cb;                      // x2:+40 x3:+80 x4:+120 ...
    if(G.comboCount>=3){ addFloat('COMBO X'+G.comboCount+'!  +'+cb,cellCenter(G.p.col,G.p.row-0.3),'#ffe23c',1.7); G.flashScreen=fl(0.15); G.hitstop=Math.max(G.hitstop,hs(0.06)); beep(1400,0.12); }
    else { addFloat('COMBO X'+G.comboCount+'  +'+cb,cellCenter(G.p.col,G.p.row-0.3),'#ffd23c',1.4); beep(1100,0.08); }
  }
  G._chipCd=CHIP_USE_CD;
}

/* ============================ ストライク / 地雷 / 衝突 ============================ */
/* --- 大域的な安全マス保証：すべての敵ストライク(警告中含む)の重なりでも、
       立てる自陣マスが必ず1つ以上残るよう、新規ストライクから該当マスを除外する。 --- */
function allyStandCells(){
  const out=[];
  for(let c=0;c<=G.playerMaxCol;c++) for(let r=0;r<ROWS;r++) if(standable(c,r)) out.push([c,r]);
  return out;
}
/* 自機の現在地から1マス以内(現在地＋上下左右)で、立てる自陣マス。
   「安全マスは現在位置から1マス移動で到達可能」(チェックリストA-2)の判定に用いる。 */
function reachableCells(){
  const out=[]; const cand=[[G.p.col,G.p.row],[G.p.col+1,G.p.row],[G.p.col-1,G.p.row],[G.p.col,G.p.row+1],[G.p.col,G.p.row-1]];
  for(const [c,r] of cand){ if(c<0||c>G.playerMaxCol||r<0||r>=ROWS) continue; if(standable(c,r)) out.push([c,r]); }
  return out;
}
function ensureGlobalSafe(newStrike){
  const stand=allyStandCells();
  if(!stand.length) return;
  const cov=new Set();
  for(const s of G.strikes){ if(s.owner!=='e'||s.applied) continue; for(const [c,r] of s.cells){ if(c<=G.playerMaxCol) cov.add(c+','+r); } }
  for(const [c,r] of newStrike.cells){ if(c<=G.playerMaxCol) cov.add(c+','+r); }
  const reach=reachableCells();
  if(reach.some(([c,r])=>!cov.has(c+','+r))) return; // 到達圏内に安全マスあり → OK
  // 到達圏内が全て危険 → 到達圏内(なければ手前優先のstand)から1マス必ず空ける
  let target = reach.length ? reach.slice().sort((a,b)=>a[0]-b[0]||a[1]-b[1])[0] : null;
  if(!target){ stand.sort((a,b)=>a[0]-b[0]||a[1]-b[1]); target=stand[0]; }
  const [sc,sr]=target;
  newStrike.cells=newStrike.cells.filter(([c,r])=>!(c===sc&&r===sr));
  for(const s of G.strikes){ if(s.owner!=='e'||s.applied) continue; s.cells=s.cells.filter(([c,r])=>!(c===sc&&r===sr)); }
}
function addStrike(s){ const o=Object.assign({t:0,applied:false,phase:'warn'},s); if(o.owner==='e') ensureGlobalSafe(o); G.strikes.push(o); }
function enemyOccupiedCells(){ const set=new Set(),out=[]; for(const e of G.enemies){ if(e.dead) continue; const k=e.col+','+e.row; if(!set.has(k)){set.add(k);out.push([e.col,e.row]);} } return out; }
function enemyCellsAll(){ const out=[]; for(let c=G.enemyMinCol;c<COLS;c++) for(let r=0;r<ROWS;r++) out.push([c,r]); return out; }
function killEnemy(e){
  if(e.dead) return;
  e.dead=true;                       // 即時確定 → FURY移行との相打ち/多重発火を防止
  const isBoss = isBossType(e.type);
  const bcol = ENEMY_DEF[e.type].col;
  const base = (isBoss?1000:120);
  // 撃破チェイン：直前の撃破から CHAIN_WINDOW 秒以内なら連鎖が伸びる
  if(G.chainT>0) G.chain++; else G.chain=1;
  G.chainT = CHAIN_WINDOW;
  let gain = base;
  if(G.chain>=2 && !isBoss){
    const bonus = Math.round(base * 0.4 * Math.min(G.chain-1, 4)); // 連鎖ボーナス（上限x4段）
    gain += bonus;
    addFloat('CHAIN x'+G.chain+'  +'+bonus, cellCenter(e.col,e.row-0.9), '#ffb03c', 1.3+Math.min(G.chain*0.05,0.4));
    beep(1000+Math.min(G.chain,6)*90, 0.07, 'square');
  }
  G.score += gain;
  addFx('delete',cellCenter(e.col,e.row),bcol,0.6);
  if(isBoss){
    // ボス撃破：大爆散＋スロー(ヒットストップ)＋CLEAR
    for(let i=0;i<5;i++) addFx('delete', cellCenter(e.col+(Math.random()-0.5),e.row+(Math.random()-0.5)), bcol, 0.7);
    addFloat('CLEAR', cellCenter(e.col,e.row-0.5), '#7dff9a', 2.4, 0.95);
    G.hitstop=Math.max(G.hitstop,hs(0.42)); G.flashScreen=Math.max(G.flashScreen,fl(0.4)); G.shake=Math.max(G.shake,0.5);
    beep(900,0.16); beep(500,0.2,'sawtooth'); beep(300,0.32,'sawtooth'); // 撃破音：重い爆散
  } else {
    if(G.chain<2 && !e._counterKill) addFloat('DELETE',cellCenter(e.col,e.row-0.4),'#ffffff',1.6,0.45); // 連鎖中はCHAIN・カウンター撃破はCOUNTERに集約(P3)
    G.hitstop=Math.max(G.hitstop,hs(0.09)); G.flashScreen=Math.max(G.flashScreen,fl(0.1)); G.shake=Math.max(G.shake,0.2);
    beep(220,0.18,'sawtooth'); beep(120,0.22,'sawtooth'); // 撃破音
  }
}
function damageEnemy(e,dmg){
  if(e.dead||e.invuln) return;
  let counter=false;
  if(e.tele){ counter=true; e.tele=false; e.stun=Math.max(e.stun,0.35); dmg=Math.round(dmg*1.5); } // カウンター成立
  e.hp-=dmg; e.flash=0.12;
  const big = dmg>=30;
  addFloat((counter?'CRIT ':'')+'-'+dmg, cellCenter(e.col,e.row-0.2),
           counter?'#ffd23c':(big?'#fff0a0':'#ffe0e0'), counter?1.5:(big?1.2:1));
  if(counter){
    const bonus=60;
    addFloat('COUNTER!  +'+bonus, cellCenter(e.col,e.row-0.8), '#ffe23c', 1.6);
    addFx('pa', cellCenter(e.col,e.row), '#ffe23c', 0.4);
    G.customGauge=Math.min(CUSTOM_FILL,G.customGauge+CUSTOM_FILL*0.18); // ゲージ加速
    G.score+=bonus; G.runCounters++;
    G.hitstop=Math.max(G.hitstop,hs(0.12)); G.flashScreen=Math.max(G.flashScreen,fl(0.16));
    beep(1600,0.07); beep(1200,0.07,'square'); beep(2000,0.05); // カウンター音：きらめき
  } else if(big){
    G.hitstop=Math.max(G.hitstop,hs(0.09)); beep(900,0.04,'square'); // 大ヒット音
  }
  if(e.hp<=0){ if(counter) e._counterKill=true; killEnemy(e); } // カウンター撃破はDELETE表示を抑制(P3)
}
function damagePlayer(dmg){
  if(G.p.iframe>0) return;
  G.p.hp=clamp(G.p.hp-dmg,0,PLAYER.maxHp);
  G.runDamage += dmg; // バスティング評価用
  G.p.iframe=PLAYER.iframe; G.p.flash=0.3; G.shake=Math.max(G.shake,0.32); G.hitstop=Math.max(G.hitstop,hs(0.05));
  addFloat('-'+dmg,playerFoot(),'#ff7a7a',1.05);
  beep(150,0.18,'square'); beep(90,0.12,'sawtooth'); // 被弾音：鈍い低音
}

/* ============================ 描画ヘルパ ============================ */
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
function playerFoot(){ return cellCenter(G.p.col,G.p.row); }
/* --- ピクセル量子化ツールキット（円弧/線を使わず整数ブロックのみ。にじみ無し） --- */
const PXU=2; // ドット単位サイズ
function qa(a){ return Math.max(0,Math.round(clamp(a,0,1)*4)/4); } // アルファを4段に量子化
function pdot(x,y,c,s){ s=s||PXU; ctx.fillStyle=c; ctx.fillRect(Math.round(x/s)*s,Math.round(y/s)*s,s,s); }
function pring(cx,cy,r,c,s){ s=s||PXU; r=Math.max(1,r); const n=Math.max(8,Math.round(r*1.4));
  for(let i=0;i<n;i++){ const a=i/n*6.283; pdot(cx+Math.cos(a)*r,cy+Math.sin(a)*r,c,s); } }
function pdisc(cx,cy,r,c,s){ s=s||PXU; cx=Math.round(cx/s)*s; cy=Math.round(cy/s)*s;
  for(let y=-r;y<=r;y+=s) for(let x=-r;x<=r;x+=s){ if(x*x+y*y<=r*r){ ctx.fillStyle=c; ctx.fillRect(cx+x,cy+y,s,s); } } }
function pline(x0,y0,x1,y1,c,s){ s=s||PXU; let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const n=Math.max(1,Math.round(Math.max(dx,dy)/s));
  for(let i=0;i<=n;i++){ const t=i/n; pdot(lerp(x0,x1,t),lerp(y0,y1,t),c,s); } }
function pframe(x,y,w,h,c,s){ s=s||PXU; for(let i=0;i<w;i+=s){ pdot(x+i,y,c,s); pdot(x+i,y+h-s,c,s); }
  for(let j=0;j<h;j+=s){ pdot(x,y+j,c,s); pdot(x+w-s,y+j,c,s); } }
function pcross(cx,cy,r,c,s){ s=s||PXU; for(let i=-r;i<=r;i+=s){ pdot(cx+i,cy,c,s); pdot(cx,cy+i,c,s); } }

/* ============================ キャラ描画(矩形ドット) ============================ */
function drawPlayer(){
  const c=cellCenter(G.p.col,G.p.row); const x=Math.round(c.x),y=Math.round(c.y);
  if(G.p.flash>0 && Math.floor(G.p.flash*30)%2===0) return;
  px(x-9,y+8,18,4,'rgba(0,0,0,0.35)');
  const by=y+Math.round(Math.sin(G.time*2.5)); // 待機の上下動(描画のみ)
  const OL='#06182e', DK='#11569a', BL='#2280e6', LT='#5cbcff', RIM='#cfeeff', CY='#5ce6ff', WT='#eaffff', M='#7f93ad', MD='#33425e';
  // 脚(関節分割＋平たい足)
  px(x-5,by-1,4,4,OL); px(x+1,by-1,4,4,OL);                         // 腿
  px(x-4,by,2,3,DK); px(x+2,by,2,3,DK);
  px(x-5,by+3,4,5,OL); px(x+1,by+3,4,5,OL);                         // すね
  px(x-4,by+4,2,3,MD); px(x+2,by+4,2,3,MD); px(x-4,by+4,2,1,M); px(x+2,by+4,2,1,M);
  px(x-6,by+8,5,3,OL); px(x+1,by+8,5,3,OL);                         // 足(幅広)
  px(x-5,by+9,3,1,M); px(x+2,by+9,3,1,M);
  // 胴(箱型シャーシ＋パネル線＋リベット)
  px(x-7,by-13,14,12,OL); px(x-6,by-12,12,10,DK); px(x-6,by-12,12,6,BL); px(x-5,by-12,9,2,LT); px(x-6,by-13,12,1,RIM);
  px(x-6,by-6,12,1,MD);                                             // 継ぎ目
  pdot(x-5,by-11,LT); pdot(x+3,by-11,LT); pdot(x-5,by-4,MD); pdot(x+3,by-4,MD); // リベット
  // 肩関節(ピボット)
  px(x-10,by-12,4,5,OL); px(x+6,by-12,4,5,OL);
  px(x-9,by-11,2,2,M); px(x+7,by-11,2,2,M); px(x-9,by-11,2,1,LT); px(x+7,by-11,2,1,LT);
  // 左腕(関節＋ハンド)
  px(x-10,by-7,3,5,OL); px(x-9,by-6,1,3,MD); px(x-10,by-2,3,2,OL); px(x-9,by-2,1,1,M);
  // 右腕(アクチュエータ＋2本爪マニピュレータ)
  px(x+7,by-7,3,5,OL); px(x+8,by-6,1,3,MD);
  px(x+7,by-2,4,3,OL); px(x+8,by-1,2,1,M);
  px(x+10,by-3,1,3,OL); px(x+12,by-3,1,3,OL); pdot(x+11,by-3,CY);   // 2本爪＋発光
  // 中央コア(ハウジング付き)
  px(x-3,by-10,6,5,OL); px(x-2,by-9,4,3,'#0e3a5a'); pdisc(x,by-7,2,CY); pdot(x,by-7,WT);
  // 首(機械ネック)
  px(x-2,by-15,4,2,OL); px(x-2,by-15,4,1,MD);
  // 頭(箱型センサーユニット＋アンテナ＋光学バンド)
  px(x-5,by-22,10,8,OL); px(x-4,by-21,8,6,DK); px(x-4,by-21,8,3,BL); px(x-3,by-21,6,1,LT); px(x-4,by-22,8,1,RIM);
  px(x-4,by-25,2,3,OL); pdot(x-4,by-25,CY);                         // アンテナ
  pdot(x-4,by-20,M); pdot(x+3,by-20,M);                            // 側面ボルト
  px(x-4,by-17,8,2,OL); px(x-3,by-16,6,1,CY); px(x,by-16,2,1,WT);  // 光学スキャナーバンド
  // チャージオーラ（ドット量子化）
  if(G.p.charging && G.p.charge>0){
    const f=clamp(G.p.charge/CHARGE.time,0,1);
    const full=f>=1;
    const t=G.time*12;
    const col=full?'#bff6ff':'#5aa0e0';
    const n=full?8:5;
    for(let i=0;i<n;i++){ const a=i*(6.283/n)+t; const rad=lerp(6,15,f)+(full?Math.sin(t*2)*2:0);
      pdot(x+Math.cos(a)*rad,by-6+Math.sin(a)*rad,col); }
    if(full) pframe(x-12,by-26,24,32,'#bff6ff');
  }
}
function drawEnemy(e){
  if(e.dead) return;
  const bob=isBossType(e.type)?Math.sin(G.time*2+e.bob)*1.5:0;
  const c=cellCenter(e.col,e.row); const x=Math.round(c.x),y=Math.round(c.y+bob);
  const flashing=e.flash>0 && Math.floor(e.flash*40)%2===0;
  ctx.globalAlpha=e.invuln?0.4:1;
  px(x-9,y+7,18,4,'rgba(0,0,0,0.3)');
  if(e.type==='crawler'){ const OL='#1a0a2e', DK='#5a2a9a', BS='#9a4cff', LT='#c79cff', RIM='#e6c8ff', EY='#ff5af0', EB='#ffd0fa';
    px(x-9,y-7,18,12,OL); px(x-8,y-6,16,10,DK); px(x-8,y-6,16,6,BS); px(x-7,y-6,14,2,LT); px(x-8,y-7,16,1,RIM);
    px(x-7,y-10,2,3,OL); px(x+5,y-10,2,3,OL); px(x-1,y-11,2,4,OL); px(x-1,y-11,2,1,LT);   // 角
    px(x-8,y+4,2,3,OL); px(x+6,y+4,2,3,OL);                                                // 脚スパイク

/* ============================ エフェクト / フロート / 環境 ============================ */
function addFx(kind,pos,col,life){ G.fx.push({kind,x:pos.x,y:pos.y,col,t:0,life,
  parts:(kind==='delete')?Array.from({length:10},()=>({a:Math.random()*6.283,s:30+Math.random()*40})):null}); }
function addFloat(txt,pos,col,scale,life){
  if(G.floats.length>=12) G.floats.shift();        // 同時表示数の上限を厳しめに(画面を埋め尽くさない)(P3)
  let oy=0;                                         // 近接するフロートとは縦にずらして重なりを避ける
  for(const f of G.floats){ if(Math.abs(f.x-pos.x)<24 && Math.abs((f.y-f.t*20)-pos.y)<14) oy-=12; }
  G.floats.push({txt,x:pos.x,y:pos.y+oy,col,t:0,life:life||0.5,scale:scale||1}); // フェード短め(既定0.5s)(P3)
}
function drawFx(){
  for(const f of G.fx){
    const k=f.t/f.life; ctx.globalAlpha=qa(1-k);
    if(f.kind==='boom'){ pring(f.x,f.y,lerp(2,15,k),f.col); pdisc(f.x,f.y,lerp(4,1,k),'#ffffff'); }
    else if(f.kind==='delete'){
      pring(f.x,f.y,lerp(3,22,k),f.col); pring(f.x,f.y,lerp(1,14,k),'#ffffff');
      ctx.globalAlpha=qa(1-k*1.3);
      for(const p of f.parts){ const d=p.s*k; pdot(f.x+Math.cos(p.a)*d,f.y+Math.sin(p.a)*d,f.col); }
      if(k<0.35){ ctx.globalAlpha=qa(0.6-k); pdisc(f.x,f.y,12,'#ffffff'); }
    }
    else if(f.kind==='slash'){ pline(f.x-12,f.y-12,f.x+12,f.y+12,f.col,PXU); pline(f.x+12,f.y-12,f.x-12,f.y+12,'#ffffff',PXU); }
    else if(f.kind==='heal'){ for(let i=0;i<5;i++){ const a=i*1.256+f.t*6; pdot(f.x+Math.cos(a)*lerp(2,12,k),f.y+Math.sin(a)*lerp(2,12,k),f.col); } }
    else if(f.kind==='spawn'||f.kind==='area'){ const rad=lerp(14,2,k); pframe(f.x-rad,f.y-rad,rad*2,rad*2,f.col); }
    else if(f.kind==='muzzle'){ pdisc(f.x,f.y,lerp(2,9,k),'#ffffff'); }
    else if(f.kind==='pa'){ pring(f.x,f.y,lerp(4,30,k),f.col); pring(f.x,f.y,lerp(2,20,k),'#ffffff'); pcross(f.x,f.y,lerp(6,20,k),f.col); }
    ctx.globalAlpha=1;
  }
  for(const fl of G.floats){
    const k=fl.t/fl.life; ctx.globalAlpha=qa(1-k);
    const pop=1+0.5*clamp((0.12-fl.t)/0.12,0,1);
    const sc=fl.scale*pop;
    btext(fl.txt, fl.x, fl.y - fl.t*20 - 6, sc, fl.col, 'center', true);
    ctx.globalAlpha=1;
  }
}

/* ============================ サウンド ============================ */
let AC=null;
function initAudio(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
function beep(freq,dur,type){ if(!AC||muted) return; try{
  const o=AC.createOscillator(),g=AC.createGain(); o.type=type||'square'; o.frequency.value=freq;
  g.gain.value=0.05; o.connect(g); g.connect(AC.destination); const t=AC.currentTime; o.start(t);
  g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur+0.02);
}catch(e){} }
let muted=false;

/* --- 簡易BGM（Web Audioで生成・外部ファイル不使用・先読みスケジューラ） --- */
const BGM={ on:false, boss:false, step:0, next:0 };
// 音名→周波数（簡易）
const NF={C:261.63,D:293.66,E:329.63,F:349.23,G:392.0,A:440.0,B:493.88};
function nf(name,oct){ const b=NF[name[0]]; const s=name.includes('#')?1.0595:1; return b*Math.pow(2,(oct-4))*s; }
// 16ステップのパターン（道中=明るめペンタ / ボス=緊張感マイナー）
const BASS_N = ['A','A','E','E','F','F','C','C','D','D','A','A','E','E','G','G'];
const ARP_N  = ['A','C','E','A','E','C','A','C','F','A','C','F','C','A','G','E'];
const BASS_B = ['A','A','A','G','F','F','F','E','D','D','D','C','E','E','G#','G#'];
const ARP_B  = ['A','E','A','C','G','D','G','A','F','C','F','A','E','B','E','G#'];
function bgmVoice(freq,t,dur,type,vol){ if(!AC||muted) return; try{
  const o=AC.createOscillator(),g=AC.createGain(); o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(AC.destination); g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02);
}catch(e){} }
function bgmStep(i,t){
  const boss=BGM.boss; const bass=boss?BASS_B:BASS_N, arp=boss?ARP_B:ARP_N;
  bgmVoice(nf(bass[i],boss?2:2)/1, t, boss?0.16:0.2, 'triangle', 0.10); // ベース
  if(i%2===0) bgmVoice(nf(arp[i],4), t, 0.12, 'square', 0.035); // アルペジオ
  if(i%4===0) bgmVoice(120, t, 0.04, 'square', 0.03); // キック代わり
  if(boss && i%2===1) bgmVoice(nf(arp[i],5), t, 0.06, 'square', 0.02);
}
function bgmTempo(){ return BGM.boss?0.135:0.16; } // 1ステップ秒
function bgmSchedule(){
  if(!AC || !BGM.on || muted) return;
  const ahead=AC.currentTime+0.25;
  if(BGM.next<AC.currentTime) BGM.next=AC.currentTime+0.02;
  while(BGM.next<ahead){ bgmStep(BGM.step%16,BGM.next); BGM.next+=bgmTempo(); BGM.step++; }
}
function bgmStart(boss){ BGM.boss=!!boss; if(!BGM.on){ BGM.on=true; BGM.step=0; BGM.next=0; } }
function bgmStop(){ BGM.on=false; }
function toggleMute(){ muted=!muted; if(muted) bgmStop(); else { if(G.state===ST.BATTLE) bgmStart(BGM.boss); } updateMuteBtn(); }
function updateMuteBtn(){ try{ const b=document.getElementById('mute'); if(b) b.textContent='BGM: '+(muted?'OFF':'ON'); }catch(e){} }
function toggleFx(){ SET.fx=!SET.fx; saveAll(); updateSetBtns(); beep(SET.fx?900:300,0.06); }
function cycleShake(){ SET.shake = SET.shake>=1 ? 0.5 : (SET.shake>=0.5 ? 0 : 1); saveAll(); updateSetBtns(); beep(700,0.05); }
function shakeLabel(){ return SET.shake>=1?'STRONG':(SET.shake>=0.5?'WEAK':'OFF'); }
function updateSetBtns(){ try{
  const f=document.getElementById('fxbtn'); if(f) f.textContent='FX:'+(SET.fx?'ON':'OFF');
  const s=document.getElementById('shakebtn'); if(s) s.textContent='SHAKE:'+shakeLabel();
}catch(e){} }

/* ============================ 敵AI ============================ */
function updateEnemies(dt){
  for(const e of G.enemies){
    if(e.dead) continue;
    if(e.flash>0) e.flash-=dt;
    if(e.moveCd>0) e.moveCd-=dt;
    if(e.stun>0){ e.stun-=dt; continue; } // スタン中は行動凍結
    e.t-=dt;
    if(e.type==='crawler') aiCrawler(e,dt);
    else if(e.type==='turret') aiTurret(e,dt);
    else if(e.type==='blade') aiBlade(e,dt);
    else if(e.type==='mortar') aiMortar(e,dt);
    else if(e.type==='boss') aiBoss(e,dt);
    else if(e.type==='omega') aiOmega(e,dt);
    // テレグラフ中(=カウンター可能)の判定。無敵中は対象外。
    e.tele = (!e.invuln) && (
      (e.type==='crawler'&&e.phase==='visible') ||
      (e.type==='turret' &&e.phase==='aim') ||
      (e.type==='mortar' &&e.phase==='aim'));
  }
}
function aiCrawler(e){
  if(e.phase==='visible'){ e.invuln=false;
    if(e.t<=0){ G.shots.push({owner:'e',fx:e.col-0.4,row:e.row,vx:evx(EVX.shock),dmg:edmg(EDMG.shock),pierce:false,hitSet:new Set(),kind:'shock',r:4,col:'#ff5c6e'});
      beep(300,0.1,'sawtooth'); e.phase='hide'; e.t=(0.9+Math.random()*0.6)*e.aggro; e.invuln=true; }
  } else { e.invuln=true;
    if(e.t<=0){ e.row=clamp(G.p.row+rint(-1,1),0,ROWS-1); let c=e.home; if(!standable(c,e.row)) c=G.enemyMinCol;
      e.col=clamp(c,G.enemyMinCol,COLS-1); e.phase='visible'; e.t=0.7+Math.random()*0.5; e.invuln=false; } }
}
function aiTurret(e){
  e.invuln=false;
  if(e.phase==='idle'){ if(G.p.row===e.row){ e.phase='aim'; e.t=0.7*e.aggro; beep(420,0.05); } }
  else if(e.phase==='aim'){ if(e.t<=0){ G.shots.push({owner:'e',fx:e.col-0.4,row:e.row,vx:evx(EVX.cannon),dmg:edmg(EDMG.cannon),pierce:false,hitSet:new Set(),kind:'cannon',r:3,col:'#ff8a2c'});
      beep(260,0.12,'square'); e.phase='cool'; e.t=0.8*e.aggro; } }
  else if(e.phase==='cool'){ if(e.t<=0) e.phase='idle'; }
}
function aiBlade(e){
  if(e.phase==='wander'){ e.invuln=false;
    if(e.t<=0){ if(Math.random()<0.55){ const nr=clamp(e.row+choice([-1,1]),0,ROWS-1); if(standable(e.col,nr)) e.row=nr; e.t=(0.6+Math.random()*0.6)*e.aggro; }
      else { e.phase='telegraph'; e.t=0.6; } } }
  else if(e.phase==='telegraph'){ e.invuln=true;
    if(e.t<=0){ e.row=G.p.row; e.col=G.enemyMinCol;
      addStrike({owner:'e',cells:[[clamp(G.playerMaxCol,0,COLS-1),e.row]],warn:ewarn(0.18),hit:0.2,dmg:edmg(EDMG.slash),kind:'slash',col:'#9cf0b0'});
      beep(360,0.1,'sawtooth'); e.phase='retreat'; e.t=0.5; } }
  else if(e.phase==='retreat'){ e.invuln=false;
    if(e.t<=0){ e.col=clamp(e.home,G.enemyMinCol,COLS-1); e.phase='wander'; e.t=(0.7+Math.random()*0.6)*e.aggro; } }
}
function aiMortar(e){
  e.invuln=false;
  if(e.phase==='idle'){ if(e.t<=0){ const cells=[];
      for(let c=0;c<=G.playerMaxCol;c++) for(let r=0;r<ROWS;r++) if(standable(c,r)) cells.push([c,r]);
      e._tgt=cells.length?choice(cells):[0,1];
      e.phase='aim'; e.t=0.42*e.aggro; beep(420,0.06); } }   // 狙いを定める予備動作（カウンター可）
  else if(e.phase==='aim'){ if(e.t<=0){
      addStrike({owner:'e',cells:[e._tgt],warn:ewarn(0.8),hit:0.25,dmg:edmg(EDMG.bomb),kind:'bomb',col:'#ffb060'});
      beep(340,0.08); e.phase='cool'; e.t=(1.35+Math.random()*0.7)*e.aggro; } }
  else if(e.phase==='cool'){ if(e.t<=0) e.phase='idle'; }
}
function aiBoss(e,dt){
  if(e.phase==='recover'){
    e.invuln=false;
    // FURY移行：HP50%以下で1回だけ。撃破(hp<=0/dead)とは相打ちさせない
    if(!e.phase2 && !e.dead && e.hp>0 && e.hp<=e.maxHp*0.5){
      e.phase2=true; G.furyT=0.3;
      G.hitstop=Math.max(G.hitstop,hs(0.3)); G.flashScreen=Math.max(G.flashScreen,fl(0.3)); G.shake=Math.max(G.shake,0.45);
      addFloat('FURY MODE',cellCenter(e.col,e.row-0.6),'#ff8a3c',2); beep(180,0.3,'sawtooth'); beep(90,0.35,'sawtooth'); }
    if(e.t<=0){
      // 盤面を移動（行・列とも敵陣内で）
      if(Math.random()<0.6){ const nr=clamp(rint(0,2),0,2); if(standable(e.col,nr)) e.row=nr; }
      if(Math.random()<0.45){ const nc=clamp(G.enemyMinCol+rint(0,COLS-1-G.enemyMinCol),G.enemyMinCol,COLS-1); if(standable(nc,e.row)) e.col=nc; }
      let atk;
      if(e.phase2){ const n=4; atk=rint(0,n-1); if(atk===e._lastAtk) atk=(atk+1)%n; } // FURY=4種からランダム
      else atk=e.bossAtkIndex%3;                                                       // 通常=学習しやすい固定順(3種)
      e._lastAtk=atk; e.bossAtkIndex++;
      let dur;
      if(atk===0) dur=bossFlame(e); else if(atk===1) dur=bossMeteor(e); else if(atk===2) dur=bossCross(e); else dur=bossHoming(e);
      e.phase='attack'; e.invuln=true; e.attackTimer=dur;
    }
  } else if(e.phase==='attack'){
    e.invuln=true; e.attackTimer-=dt;
    if(e.attackTimer<=0){ e.phase='recover'; e.invuln=false; e.t=(e.phase2?0.85:1.3)*DIFF.aggro; }
  }
}
function ensureSafe(danger){
  const reach=reachableCells();
  if(reach.some(([c,r])=>!danger.has(c+','+r))) return; // 到達圏内に安全マスあり
  const stand=allyStandCells(); if(!stand.length) return;
  let t = reach.length ? reach.slice().sort((a,b)=>a[0]-b[0]||a[1]-b[1])[0]
                       : (stand.sort((a,b)=>a[0]-b[0]||a[1]-b[1]), stand[0]);
  danger.delete(t[0]+','+t[1]);
}
/* 予告(warn)時間を計算。各攻撃の「初回使用時のみ」1.4倍に延ばし(P3)、初見の理不尽を緩和する。
   key = 攻撃種別の識別子。2回目以降は通常速度に戻る。最低0.5秒を保証。 */
function bw(e,key,base){
  e._used = e._used || {};
  const first = !e._used[key]; e._used[key]=true;
  return Math.max(0.5, ewarn(base) * (first?1.4:1));
}
function bossFlame(e){
  const rows=e.phase2?2:1; const pick=shuffle([0,1,2]).slice(0,rows);
  const danger=new Set(),cells=[];
  // 難易度別の退避レーン：EASY=2列/NORMAL=1列/HARD=0列を自陣側で必ず空ける(明確な逃げ場)
  const freeCols = DIFF.key==='EASY'?2 : (DIFF.key==='NORMAL'?1 : 0);
  const safeCols = new Set();
  for(let i=0;i<freeCols && i<=G.playerMaxCol;i++) safeCols.add(G.playerMaxCol-i); // 手前(左)の列から空ける
  for(const r of pick){ for(let c=0;c<COLS;c++){ if(c<=G.playerMaxCol && safeCols.has(c)) continue; cells.push([c,r]); if(c<=G.playerMaxCol) danger.add(c+','+r); } }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>c>G.playerMaxCol||danger.has(c+','+r));
  const warn=bw(e,'flame',e.phase2?0.65:0.8);
  addStrike({owner:'e',cells:fc,warn,hit:0.3,dmg:edmg(EDMG.flame),kind:'flame',col:'#ff6a3c'});
  beep(200,0.2,'sawtooth'); return warn+0.3+0.1;
}
function bossMeteor(e){
  const stand=[]; for(let c=0;c<=G.playerMaxCol;c++) for(let r=0;r<ROWS;r++) if(standable(c,r)) stand.push([c,r]);
  const k=Math.min(stand.length-1,(e.phase2?6:5)+DIFF.meteor);
  const tgt=shuffle(stand).slice(0,Math.max(1,k));
  const danger=new Set(tgt.map(([c,r])=>c+','+r)); ensureSafe(danger);
  const cells=tgt.filter(([c,r])=>danger.has(c+','+r));
  const warn=bw(e,'meteor',e.phase2?0.8:1.0);
  addStrike({owner:'e',cells,warn,hit:0.25,dmg:edmg(EDMG.meteor),kind:'meteor',col:'#ff4a5a'});
  beep(240,0.15,'sawtooth'); return warn+0.25+0.1;
}
function bossCross(e){
  const danger=new Set(),cells=[];
  for(let c=0;c<COLS;c++){ cells.push([c,e.row]); if(c<=G.playerMaxCol) danger.add(c+','+e.row); }
  const cx=clamp(G.playerMaxCol,0,COLS-1);
  for(let r=0;r<ROWS;r++){ cells.push([cx,r]); danger.add(cx+','+r); }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>c>G.playerMaxCol||danger.has(c+','+r));
  const warn=bw(e,'cross',e.phase2?0.55:0.7);
  addStrike({owner:'e',cells:fc,warn,hit:0.25,dmg:edmg(EDMG.cross),kind:'cross',col:'#ff7a5c'});
  beep(180,0.22,'sawtooth'); return warn+0.25+0.1;
}
function bossHoming(e){
  // 自機の現在行をロックオン → 予告 → その行を薙ぐ（別の行へ動けば回避できる）
  const row=G.p.row; const danger=new Set(),cells=[];
  for(let c=0;c<COLS;c++){ cells.push([c,row]); if(c<=G.playerMaxCol) danger.add(c+','+row); }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>c>G.playerMaxCol||danger.has(c+','+r));
  const warn=bw(e,'homing',e.phase2?0.62:0.78);
  addStrike({owner:'e',cells:fc,warn,hit:0.25,dmg:edmg(EDMG.cross),kind:'cross',col:'#ff5a4a'});
  beep(260,0.16,'sawtooth'); beep(160,0.16,'sawtooth'); return warn+0.25+0.1;
}

/* ============================ EXボス OMEGA（縦＝列ロック軸） ============================ */
/* INFERNO が「行(横)」中心なのに対し、OMEGA は「列(縦)」を封じる攻撃が主体。
   全攻撃は addStrike 経由＝ensureGlobalSafe により必ず到達可能な安全マスが残る(詰み無し)。
   予告マーカーは視認性ルールに従い赤橙固定(addStrike の warning 色は固定)。自走弾は持たない。 */
function aiOmega(e,dt){
  if(e.phase==='recover'){
    e.invuln=false;
    // OVERLOAD(FURY相当)：HP50%以下で1回だけ。撃破との相打ちを防ぐ
    if(!e.phase2 && !e.dead && e.hp>0 && e.hp<=e.maxHp*0.5){
      e.phase2=true; G.furyT=0.3;
      G.hitstop=Math.max(G.hitstop,hs(0.3)); G.flashScreen=Math.max(G.flashScreen,fl(0.3)); G.shake=Math.max(G.shake,0.45);
      addFloat('OVERLOAD',cellCenter(e.col,e.row-0.6),'#c79cff',2); beep(200,0.3,'square'); beep(120,0.35,'sawtooth'); }
    if(e.t<=0){
      if(Math.random()<0.6){ const nr=clamp(rint(0,2),0,2); if(standable(e.col,nr)) e.row=nr; }
      if(Math.random()<0.45){ const nc=clamp(G.enemyMinCol+rint(0,COLS-1-G.enemyMinCol),G.enemyMinCol,COLS-1); if(standable(nc,e.row)) e.col=nc; }
      let atk;
      if(e.phase2){ const n=4; atk=rint(0,n-1); if(atk===e._lastAtk) atk=(atk+1)%n; } // OVERLOAD=4種
      else atk=e.bossAtkIndex%3;                                                       // 通常=学習しやすい固定順(3種)
      e._lastAtk=atk; e.bossAtkIndex++;
      let dur;
      if(atk===0) dur=omegaColumns(e); else if(atk===1) dur=omegaTrack(e); else if(atk===2) dur=omegaFrost(e); else dur=omegaNova(e);
      e.phase='attack'; e.invuln=true; e.attackTimer=dur;
    }
  } else if(e.phase==='attack'){
    e.invuln=true; e.attackTimer-=dt;
    if(e.attackTimer<=0){ e.phase='recover'; e.invuln=false; e.t=(e.phase2?0.85:1.3)*DIFF.aggro; }
  }
}
/* COLUMN CRUSH：自陣の列を丸ごと封鎖(通常1列/OVERLOAD2列)。空き列へ横移動して回避。 */
function omegaColumns(e){
  const k = e.phase2?2:1;                                  // 封鎖する自陣列の数(最大でも3-1=2列まで→必ず1列残る)
  const cols = shuffle(Array.from({length:G.playerMaxCol+1},(_,i)=>i)).slice(0,k);
  const danger=new Set(),cells=[];
  for(const c of cols){ for(let r=0;r<ROWS;r++){ cells.push([c,r]); danger.add(c+','+r); } }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>danger.has(c+','+r));
  const warn=bw(e,'col',e.phase2?0.72:0.9);
  addStrike({owner:'e',cells:fc,warn,hit:0.3,dmg:edmg(EDMG.flame),kind:'flame',col:'#a86aff'});
  beep(170,0.2,'square'); beep(110,0.18,'sawtooth'); return warn+0.3+0.1;
}
/* DATA LOCK：自機が「今いる列」を狙ってロック→封鎖。別の列へ動けば回避(追尾系=横の駆け引き)。 */
function omegaTrack(e){
  const col=clamp(G.p.col,0,G.playerMaxCol); const danger=new Set(),cells=[];
  for(let r=0;r<ROWS;r++){ cells.push([col,r]); danger.add(col+','+r); }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>danger.has(c+','+r));
  const warn=bw(e,'track',e.phase2?0.6:0.78);
  addStrike({owner:'e',cells:fc,warn,hit:0.25,dmg:edmg(EDMG.cross),kind:'cross',col:'#7a6aff'});
  beep(240,0.14,'square'); beep(150,0.14,'sawtooth'); return warn+0.25+0.1;
}
/* GLITCH FIELD：自陣を市松模様で危険化。安全マスは必ず隣接(1マス移動で到達可)。 */
function omegaFrost(e){
  const parity = rint(0,1); const danger=new Set(),cells=[];
  for(let c=0;c<=G.playerMaxCol;c++) for(let r=0;r<ROWS;r++){ if(((c+r)&1)===parity){ cells.push([c,r]); danger.add(c+','+r); } }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>danger.has(c+','+r));
  const warn=bw(e,'frost',e.phase2?0.66:0.82);
  addStrike({owner:'e',cells:fc,warn,hit:0.25,dmg:edmg(EDMG.meteor),kind:'meteor',col:'#6ad0ff'});
  beep(300,0.12,'square'); beep(200,0.12,'sawtooth'); return warn+0.25+0.1;
}
/* OVERLOAD NOVA(OVERLOAD専用)：自機の現在列の隣接1列だけを安全にして他を全封鎖。必ず1マス以内に逃げ場。 */
function omegaNova(e){
  const safeCol = clamp(G.p.col + rint(-1,1), 0, G.playerMaxCol); // 退避先は現在列の±1(到達保証)
  const danger=new Set(),cells=[];
  for(let c=0;c<=G.playerMaxCol;c++){ if(c===safeCol) continue; for(let r=0;r<ROWS;r++){ cells.push([c,r]); danger.add(c+','+r); } }
  ensureSafe(danger);
  const fc=cells.filter(([c,r])=>danger.has(c+','+r));
  const warn=bw(e,'nova',0.92);
  addStrike({owner:'e',cells:fc,warn,hit:0.3,dmg:edmg(EDMG.meteor),kind:'meteor',col:'#c79cff'});
  beep(150,0.26,'sawtooth'); beep(90,0.3,'sawtooth'); return warn+0.3+0.12;
}

/* ============================ 更新（弾・ストライク・地雷・FX） ============================ */
function updateShots(dt){
  for(const s of G.shots){
    s.fx+=(s.owner==='p'?s.vx:-s.vx)*dt;
    if(s.owner==='p'){
      for(const e of G.enemies){ if(e.dead||e.invuln) continue; if(e.row!==s.row) continue; if(s.hitSet.has(e)) continue;
        if(Math.abs(s.fx-(e.col+0.5))<0.45){ damageEnemy(e,s.dmg);
          if(s.pierce){ s.hitSet.add(e); } else { s.dead=true; addFx('boom',cellCenter(e.col,e.row),s.col,0.25); break; } } }
    } else {
      if(G.p.row===s.row && Math.abs(s.fx-(G.p.col+0.5))<0.45){ damagePlayer(s.dmg); s.dead=true; }
    }
    if(s.fx<-0.5||s.fx>COLS+0.5) s.dead=true;
  }
  G.shots=G.shots.filter(s=>!s.dead);
}
function updateStrikes(dt){
  for(const s of G.strikes){
    s.t+=dt;
    if(!s.applied){
      if(s.t>=s.warn){
        if(s.owner==='e'){
          if(G.p.iframe<=0 && s.cells.some(([c,r])=>c===G.p.col&&r===G.p.row)) damagePlayer(s.dmg);
          for(const [c,r] of s.cells) addFx('boom',cellCenter(c,r),s.col,0.3);
        } else {
          for(const e of G.enemies){ if(e.dead||e.invuln) continue; if(s.cells.some(([c,r])=>c===e.col&&r===e.row)){ damageEnemy(e,s.dmg); if(s.stun && !isBossType(e.type)) e.stun=Math.max(e.stun,s.stun); } }
          for(const [c,r] of s.cells) addFx(s.kind==='slash'?'slash':'boom',cellCenter(c,r),s.col,0.3);
        }
        s.applied=true; s.t=0; s.phase='hit';
      }
    } else { if(s.t>=s.hit) s.done=true; }
  }
  G.strikes=G.strikes.filter(s=>!s.done);
}
function updateMines(dt){
  for(const m of G.mines){ m.t-=dt;
    for(const e of G.enemies){ if(e.dead||e.invuln) continue; if(e.col===m.col&&e.row===m.row){ damageEnemy(e,m.dmg);
      addFx('boom',cellCenter(m.col,m.row),m.col_,0.4); m.done=true; break; } }
    if(m.t<=0) m.done=true; }
  G.mines=G.mines.filter(m=>!m.done);
}
function updateFx(dt){
  for(const f of G.fx){ f.t+=dt; if(f.t>=f.life) f.done=true; }
  G.fx=G.fx.filter(f=>!f.done);
  for(const fl of G.floats){ fl.t+=dt; if(fl.t>=fl.life) fl.done=true; }
  G.floats=G.floats.filter(f=>!f.done);
}
function updatePanels(dt){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ const p=G.panels[r][c];
    if(p.type==='hole'){ p.regen-=dt; if(p.regen<=0) p.type='normal'; } }
}
function updateEmbers(dt){
  const lb=liveBoss();
  if(lb && Math.random()<0.4){
    const omega=lb.type==='omega';
    G.embers.push({x:rint(20,VW-20),y:VH-30,vy:-(10+Math.random()*20),t:0,life:1.6,
      col: omega ? (Math.random()<0.5?'#7a6aff':'#6ad0ff') : (Math.random()<0.5?'#ff7a3c':'#ffb060')}); }
  for(const p of G.embers){ p.t+=dt; p.y+=p.vy*dt; p.x+=Math.sin(p.t*4)*0.3; if(p.t>=p.life) p.done=true; }
  G.embers=G.embers.filter(p=>!p.done);
}

/* ============================ 移動（氷の滑り含む） ============================ */
function tryMovePlayer(dc,dr){
  let nc=G.p.col+dc, nr=G.p.row+dr;
  if(nc<0||nc>G.playerMaxCol||nr<0||nr>=ROWS) return;
  if(!standable(nc,nr)) return;
  const from=G.panels[G.p.row][G.p.col];
  G.p.col=nc; G.p.row=nr;
  if(from.type==='crack'){ from.type='hole'; from.regen=4.0; }
  // 氷：着地マスが氷なら同方向へ更に滑る
  let slides=0;
  while(G.panels[G.p.row][G.p.col].type==='ice' && slides<3){
    const tc=G.p.col+dc, tr=G.p.row+dr;
    if(tc<0||tc>G.playerMaxCol||tr<0||tr>=ROWS) break;
    if(!standable(tc,tr)) break;
    const f2=G.panels[G.p.row][G.p.col];
    G.p.col=tc; G.p.row=tr;
    if(f2.type==='crack'){ f2.type='hole'; f2.regen=4.0; }
    slides++;
  }
  G.p.moveCd=PLAYER.moveCd;
}

/* ============================ バトル更新 ============================ */
function updateBattle(dt){
  const p=G.p;
  if(p.iframe>0) p.iframe-=dt;
  if(p.flash>0) p.flash-=dt;
  if(p.moveCd>0) p.moveCd-=dt;
  if(p.busterCd>0) p.busterCd-=dt;
  if(G._chipCd>0) G._chipCd-=dt;
  if(G.shake>0) G.shake-=dt;
  if(G.flashScreen>0) G.flashScreen-=dt;
  if(p.charging) p.charge+=dt;
  if(G.chainT>0){ G.chainT-=dt; if(G.chainT<=0){ G.chainT=0; G.chain=0; } }
  if(G.cutin){ G.cutin.t+=dt; if(G.cutin.t>=G.cutin.life) G.cutin=null; }
  if(G.furyT>0) G.furyT-=dt;

  // アウトロ演出中（クリア/ボス撃破スロー/敗北）：入力と敵AIを凍結し、
  // 撃破の爆散・CLEAR・被弾の手応えを見せ切ってから結果画面へ遷移する。
  if(G.outroKind){
    updateShots(dt); updateStrikes(dt); updateMines(dt); updateFx(dt); updateEmbers(dt); updatePanels(dt);
    G.outroT-=dt;
    if(G.outroT<=0){
      if(G.outroKind==='victory') enterVictory();
      else if(G.outroKind==='gameover') enterGameOver();
      else enterResult();
    }
    return;
  }

  if(p.moveCd<=0){
    if(held.up) tryMovePlayer(0,-1);
    else if(held.down) tryMovePlayer(0,1);
    else if(held.left) tryMovePlayer(-1,0);
    else if(held.right) tryMovePlayer(1,0);
  }
  if(!G.customReady){ G.customGauge+=dt; if(G.customGauge>=CUSTOM_FILL){ G.customGauge=CUSTOM_FILL; G.customReady=true; beep(720,0.06); } }

  updateEnemies(dt); updateShots(dt); updateStrikes(dt); updateMines(dt); updateFx(dt); updatePanels(dt); updateEmbers(dt);

  if(G.enemies.every(e=>e.dead)){
    // 即遷移せず、アウトロへ。ボスは撃破スローと爆散を見せ切る。
    G.p.iframe=Math.max(G.p.iframe,2.0); // 演出中の流れ弾による事故死を防止
    if(G.wave>=G.finalWave){ G.outroKind='victory'; G.outroT=0.85; }      // 最終ボス撃破：爆散＋CLEAR→勝利
    else if(isBossWave(G.wave)){ G.outroKind='result'; G.outroT=0.85; }   // 中間ボス(EX時のINFERNO)も撃破スローを見せる
    else { G.outroKind='result'; G.outroT=0.45; }                         // 通常ウェーブ：最後のDELETEを見せる
    return;
  }
  if(p.hp<=0){ G.p.iframe=Math.max(G.p.iframe,2.0); G.outroKind='gameover'; G.outroT=0.5; return; } // 被弾の手応えを見せてからGAME OVER
}
function enterResult(){
  // クリアボーナス＋残HPボーナス
  G.score += 300 + Math.max(0,Math.ceil(G.p.hp))*2;
  // 成績連動ドロップ：このウェーブの残HPが高い(=被弾が少ない)ほど良いチップが出る
  const hpRatio = G.p.hp/PLAYER.maxHp;
  const rarePool=['LONG','BACK','RAIN','CLUSTER','TERRITORY','WIDE','SURGE'];
  const midBoss = isBossWave(G.wave) && G.wave < G.finalWave; // EXモード時のINFERNO中間撃破
  let r;
  if(midBoss){ r=[choice(['BACK','LONG','SURGE']), choice(['L','S','*'])]; } // 中間ボス＝確定レアドロップ
  else if(hpRatio>=0.70){ r=[choice(rarePool), choice(['S','*','L'])]; }     // 好成績＝レア寄り
  else { r=choice(BASE_FOLDER); }
  const wasNew = !DISCOVERED[r[0]];               // 図鑑初登録か(リザルトのNEW!表示用)
  G.reward={id:r[0],code:r[1],isNew:wasNew};
  G.folder.push([r[0],r[1]]);
  discover(r[0]);
  if(hpRatio>=0.85) discover(choice(rarePool)); // ほぼ無傷なら収集ボーナス
  G.outroKind=null; G.outroT=0;
  G.state=ST.RESULT; G.stateT=0; beep(990,0.18); beep(1320,0.12);
}
function enterVictory(){
  G.score += 600 + Math.max(0,Math.ceil(G.p.hp))*3; // ボス撃破ボーナス＋残HP
  G._newBest = commitBest(G.score);
  G.report = clearReport();     // 内訳付きクリアレポート(クリア時のみS+〜Cが付く)
  G.bustRank = G.report.rank;
  commitRank(G.bustRank);       // 現在系列(通常/EX)のベストランクを更新(P2)
  // 実績解放(P4)：条件を満たすメダルを付与（重複付与は unlockAch 側で抑止）
  if(G.diffName==='EASY')    unlockAch('clearE');
  if(G.diffName==='NORMAL')  unlockAch('clearN');
  if(G.diffName==='HARD')    unlockAch('clearH');
  if(isExRun())              unlockAch('clearEX');
  if((G.runDamage||0)<=0)    unlockAch('flawless');
  if(G.report.rank==='S+')   unlockAch('perfect');
  if((G.runPA||0)>=3)        unlockAch('paAdept');
  if((G.runMaxCombo||0)>=5)  unlockAch('chainer');
  if(libComplete())          unlockAch('master');
  if(!EX_UNLOCKED){ EX_UNLOCKED=true; G._exJustUnlocked=true; saveAll(); } // 初回クリアでEXボス解放(永続)
  G.outroKind=null; G.outroT=0;
  G.state=ST.VICTORY; G.stateT=0; G.shake=0; G.flashScreen=0;
  bgmStop(); beep(700,0.12); beep(900,0.12); beep(1200,0.2);
}
function enterGameOver(){
  G._newBest = commitBest(G.score);
  G.outroKind=null; G.outroT=0;
  G.state=ST.GAMEOVER; G.stateT=0; G.shake=0; G.flashScreen=0;
  bgmStop(); beep(120,0.4,'sawtooth');
}
function retryWave(){
  G.usedContinue = true;        // リトライ＝コンティニュー使用 → Sランク不可(P1)
  G.score = G._waveStartScore;  // スコアの不正な水増しを防ぐため、ウェーブ開始時点へ巻き戻す
  startWave(G.wave);
}

/* バスター */
function busterPress(){
  if(G.state!==ST.BATTLE) return;
  if(G.cutin){ G.cutin.t = Math.min(G.cutin.life, G.cutin.t + 0.3); } // 連打でカットイン短縮
  if(G.outroKind) return;                        // アウトロ演出中は発射しない
  if(busterDown) return;
  busterDown=true; G.p.charging=true; G.p.charge=0;
  if(G.p.busterCd<=0){ spawnShot({fx:G.p.col+0.6,row:G.p.row,vx:BUSTER.vx,dmg:BUSTER.dmg,kind:'buster',col:'#bfe9ff',r:2});
    G.p.busterCd=BUSTER.cd; beep(880,0.03,'square'); }
}
function busterRelease(){
  if(!busterDown) return; busterDown=false;
  if(G.state===ST.BATTLE && G.p.charging && G.p.charge>=CHARGE.time){
    spawnShot({fx:G.p.col+0.6,row:G.p.row,vx:CHARGE.vx,dmg:CHARGE.dmg,kind:'charge',col:'#7df0ff',r:5});
    addFx('muzzle',cellCenter(G.p.col,G.p.row),'#bff6ff',0.18); G.shake=Math.max(G.shake,0.12); beep(1200,0.12); beep(700,0.1);
  }
  G.p.charging=false; G.p.charge=0;
}

/* ============================ 描画：フィールド ============================ */
function ditherFill(a,b,cc,d,base,dark){
  // 簡易ディザ：面を base で塗り、ドットで dark を散らす
  ctx.fillStyle=base;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(cc.x,cc.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.fill();
}
function drawPanelQuad(c,r){
  const u0=c/COLS,u1=(c+1)/COLS,v0=r/ROWS,v1=(r+1)/ROWS;
  const a=fieldPoint(u0,v0),b=fieldPoint(u1,v0),cc=fieldPoint(u1,v1),d=fieldPoint(u0,v1);
  const p=G.panels[r][c]; const ally=c<=G.playerMaxCol;
  if(p.type==='hole'){ ctx.fillStyle='#04050b';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(cc.x,cc.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#10121d'; ctx.lineWidth=1; ctx.stroke(); return; }
  const glow=0.5+0.5*Math.sin(G.time*2 + (c+r));
  let base,edge,dot;
  if(p.type==='ice'){ base=ally?'#3a6e9a':'#6a3a44'; edge='#bff0ff'; dot='#bfe8ff'; }
  else if(p.type==='crack'){ base=ally?'#2a4e7a':'#7a2e3a'; edge=ally?'#4a78b0':'#b04a58'; dot=ally?'#1b3050':'#50202a'; }
  else { base=ally?'#2f5e96':'#963a44'; edge=ally?'#5a92d0':'#d05a68'; dot=ally?'#244a78':'#7a2c34'; }
  ditherFill(a,b,cc,d,base,dot);
  // ディザリング（ドット階調で陰影：上辺寄り=明 / 下辺寄り=暗）
  const m=fieldPoint((u0+u1)/2,(v0+v1)/2);
  const lite = ally?'#7ab0e0':'#e07a86';
  const topP=fieldPoint((u0+u1)/2,v0+0.18);
  const botP=fieldPoint((u0+u1)/2,v1-0.18);
  ctx.fillStyle=lite;
  ctx.fillRect(Math.round(topP.x-6),Math.round(topP.y),2,2);
  ctx.fillRect(Math.round(topP.x+2),Math.round(topP.y+2),2,2);
  ctx.fillRect(Math.round(topP.x-1),Math.round(topP.y-2),2,2);
  ctx.fillStyle=dot;
  ctx.fillRect(Math.round(m.x-6),Math.round(m.y-2),2,2);
  ctx.fillRect(Math.round(m.x+4),Math.round(m.y+2),2,2);
  ctx.fillRect(Math.round(m.x-1),Math.round(m.y+4),2,2);
  ctx.fillRect(Math.round(botP.x+5),Math.round(botP.y),2,2);
  ctx.fillRect(Math.round(botP.x-4),Math.round(botP.y+1),2,2);
  // 枠（発光）
  ctx.strokeStyle=edge; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(cc.x,cc.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.stroke();
  if(p.type==='ice'){ ctx.strokeStyle='rgba(220,245,255,0.7)'; ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(a.x+4,a.y+3); ctx.lineTo(cc.x-4,cc.y-3); ctx.stroke(); }
  if(p.type==='crack'){ ctx.strokeStyle=edge; ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(m.x,m.y); ctx.lineTo(cc.x,cc.y); ctx.moveTo(d.x,d.y); ctx.lineTo(m.x,m.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  // パネル発光（ボス時は強め。OMEGAは紫系）
  const lb=liveBoss();
  if(lb){ const omega=lb.type==='omega'; ctx.globalAlpha=0.10*glow; ctx.fillStyle=ally?'#5aa0ff':(omega?'#9a6aff':'#ff6a5a');
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(cc.x,cc.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; }
}
function drawField(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) drawPanelQuad(c,r);
  const t=fieldPoint(G.enemyMinCol/COLS,0), b=fieldPoint(G.enemyMinCol/COLS,1);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(b.x,b.y); ctx.stroke();
}
/* P2: 攻撃予告を2層に分離する。
   drawStrikeTint = 床のタイル塗り(キャラの下に描く)。
   drawStrikeMarkers = 着弾予告マーカー(最前面に描く＝ダメージ数値/コンボ/エフェクト/カットインに隠れない)。 */
function drawStrikeTint(){
  for(const s of G.strikes){
    const warning=!s.applied; const enemy=(s.owner==='e');
    for(const [c,r] of s.cells){
      const u0=c/COLS,u1=(c+1)/COLS,v0=r/ROWS,v1=(r+1)/ROWS;
      const a=fieldPoint(u0,v0),b=fieldPoint(u1,v0),cc=fieldPoint(u1,v1),d=fieldPoint(u0,v1);
      if(warning){ const blink=Math.floor(s.t*12)%2===0;
        ctx.globalAlpha=enemy?(blink?0.5:0.25):(blink?0.45:0.2);
        ctx.fillStyle=enemy?'#ff3a2c':'#46d8ff';
      } else {
        ctx.globalAlpha=enemy?0.6:0.55; ctx.fillStyle=enemy?'#ff8a2c':'#9cf0ff';
      }
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(cc.x,cc.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}
function drawStrikeMarkers(){
  for(const s of G.strikes){
    const warning=!s.applied; const enemy=(s.owner==='e');
    for(const [c,r] of s.cells){
      const u0=c/COLS,u1=(c+1)/COLS,v0=r/ROWS,v1=(r+1)/ROWS;
      const mid=fieldPoint((u0+u1)/2,(v0+v1)/2);
      if(warning){ const blink=Math.floor(s.t*12)%2===0;
        const mk=enemy?'#ff5a3c':'#7df0ff';            // 視認性ルール：敵=赤橙 / 自機=水色
        pcross(mid.x,mid.y,9,mk,2);
        pframe(mid.x-9,mid.y-7,18,14,blink?mk:'#ffffff',2);
        if(enemy && blink) pframe(mid.x-7,mid.y-5,14,10,'#ffd23c',2);
      } else {
        pdisc(mid.x,mid.y,8,enemy?'#ffd23c':'#ffffff');
      }
    }
  }
}
function drawShots(){
  for(const s of G.shots){ const pt=fxPoint(s.fx,s.row);
    const enemy=(s.owner==='e'); const back=enemy?1:-1;
    const core=enemy?'#ffcf9a':'#dffbff'; // 敵=暖色芯 / 自機=寒色芯（白は使わない）
    if(s.kind==='charge'){
      for(let i=1;i<=3;i++) pdot(pt.x+i*3*back,pt.y,'#7df0ff');
      pdisc(pt.x,pt.y,s.r,'#9be8ff'); pring(pt.x,pt.y,s.r+1,'#46c8ff'); pdisc(pt.x,pt.y,Math.max(1,s.r-2),core);
    } else if(s.kind==='shock'||s.kind==='wave'){
      const h=s.r*4; px(pt.x-3,pt.y-h/2,6,h,'#16060e'); px(pt.x-2,pt.y-h/2+1,4,h-2,s.col); px(pt.x-1,pt.y-h/2+1,2,h-2,core);
    } else {
      const R=Math.max(3,s.r);
      for(let i=1;i<=2;i++) pdot(pt.x+i*3*back,pt.y,enemy?'#ff8a3c':'#7df0ff');
      px(pt.x-R-1,pt.y-R-1,(R+1)*2,(R+1)*2,'#160610');
      pdisc(pt.x,pt.y,R,s.col); pdisc(pt.x,pt.y,Math.max(1,R-2),core);
    }
  }
}
function drawMines(){
  for(const m of G.mines){ const pt=cellCenter(m.col,m.row); const blink=Math.floor(m.t*6)%2===0;
    px(pt.x-5,pt.y-3,10,6,'#1a0e06'); px(pt.x-4,pt.y-2,8,4,m.col_); if(blink) px(pt.x-1,pt.y-1,2,2,'#fff'); }

function drawEmbers(){ for(const p of G.embers){ ctx.globalAlpha=qa(1-p.t/p.life); pdot(p.x,p.y,p.col); ctx.globalAlpha=1; } }

function bar(x,y,w,h,frac,fill,back){ px(x-1,y-1,w+2,h+2,'#0a0a14'); px(x,y,w,h,back||'#222a3a'); px(x,y,Math.round(w*clamp(frac,0,1)),h,fill); }

function drawBattleScene(faded){
  const boss=isBossType_live();
  drawBG(boss);
  let ox=0,oy=0;
  if(!faded && G.shake>0){ const m=G.shake*SET.shake; ox=(Math.random()-0.5)*7*m; oy=(Math.random()-0.5)*7*m; }
  G._ox = faded?0:ox; G._oy = faded?0:oy;   // 予告マーカーを同じ揺れで最前面描画するため保持
  ctx.save(); ctx.translate(ox,oy);
  if(boss) drawEmbers();
  drawField(); drawStrikeTint();            // 床のタイル塗りはキャラの下(P2)
  for(let r=0;r<ROWS;r++){
    const list=G.enemies.filter(e=>!e.dead&&e.row===r).sort((a,b)=>a.col-b.col);
    for(const e of list) drawEnemy(e);
    if(G.p.row===r) drawPlayer();
  }
  drawMines(); drawShots(); drawFx();
