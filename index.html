      const parts=Object.keys(cnt).map(id=>CHIPS[id].jp+(cnt[id]>1?'×'+cnt[id]:''));
      let info='内容：'+parts.join(' ／ '); if(info.length>30) info=info.slice(0,29)+'…';
      jtext('選択 '+sel.length+'枚'+(maxSame>=2?'（COMBO：同名'+maxSame+'枚）':''), X+12, Y+28, '#bfe3ff', 11, 'left');
      jtext(info, X+12, Y+41, '#9fc8e0', 9, 'left');
    }
  }
}
function drawCustom(){
  drawBattleScene(true);
  ctx.fillStyle='rgba(6,10,20,0.85)'; ctx.fillRect(0,0,VW,VH);
  btext('CUSTOM SCREEN',VW/2,9,1.7,'#7df0ff','center',true);
  layoutCustom();
  // V10：P.A.可視化の中核。選択がP.A.か(pa)、手札にどんなP.A.機会があるか(hp)を先に解析。
  const sel=selectedChips(); const pa=detectPA(sel); const hp=analyzeHandPA();
  // 動的ヒント行（y=23〜）：P.A.成立中＞P.A.可能＞汎用ヒント の優先で1行表示
  if(pa){
    const blink=Math.floor(G.time*4)%2===0;
    px(40,23,VW-80,13, blink?'#3a0a28':'#280720'); pframe(40,23,VW-80,13,'#ff5af0',1);
    btext('P.A. READY   '+pa.name, VW/2, 25, 1.0, blink?'#ffd6f4':'#ff8ad8','center',true);
  } else if(hp.list.length){
    const names=hp.list.map(o=>o.name).slice(0,2).join(' / ');
    jtext('P.A. 可能！ '+names+'（桃色 PA のチップを揃える）',VW/2,32,'#ff9ae0',9,'center');
  } else {
    jtext('同名2枚以上でCOMBO ／ 同名3枚 or BLADE+WIDE+LONG でP.A.',VW/2,32,'#9fb8d8',9,'center');
  }
  for(const cr of G.cardRects){
    const h=G.hand[cr.i],def=CHIPS[h.id]; const sel2=G.selected.includes(cr.i);
    const order=G.selected.indexOf(cr.i)+1; const addable=sel2||canAddIndex(cr.i);
    px(cr.x-1,cr.y-1,cr.w+2,cr.h+2,'#0a0e18');
    ctx.globalAlpha=addable?1:0.4;
    px(cr.x,cr.y,cr.w,cr.h,sel2?'#23406a':'#14203a');
    chipIcon(cr.x+5,cr.y+5,18,def);
    btext(def.id,cr.x+27,cr.y+6,1,'#fff','left',true);
    btext('['+h.code+']',cr.x+27,cr.y+17,1,'#ffe23c','left',true);
    jtext(def.jp,cr.x+5,cr.y+36,'#bfe3ff',9);
    ctx.globalAlpha=1;
    if(sel2){ ctx.strokeStyle='#ffe23c'; ctx.lineWidth=2; ctx.strokeRect(cr.x,cr.y,cr.w,cr.h);
      px(cr.x+cr.w-12,cr.y+2,11,11,'#ffe23c'); btext(''+order,cr.x+cr.w-9,cr.y+4,1,'#000','left',false); }
    if(cr.i===G.cursor){ ctx.strokeStyle='#7df0ff'; ctx.lineWidth=1; ctx.strokeRect(cr.x-2,cr.y-2,cr.w+4,cr.h+4); }
    // V10：P.A.関与チップに桃色「PA」タグ。現在の選択を完成させる一枚は点滅で最強調。
    if(hp.cardSet.has(cr.i) && addable){
      const completes = !pa && wouldCompletePA(cr.i);
      const blink = completes && (Math.floor(G.time*5)%2===0);
      const tx=cr.x+cr.w-19, ty=cr.y+cr.h-11;
      px(tx,ty,17,10, completes?(blink?'#ff5af0':'#5a1040'):'#241026');
      pframe(tx,ty,17,10, completes?(blink?'#ffd6f4':'#ff5af0'):'#a8407a', 1);
      btext('PA', tx+4, ty+2, 0.85, completes?'#fff':'#ff9ae0','left',false);
    }
  }
  // V11：カーソル位置のチップ効果を解説する情報パネル
  drawChipInfoPanel(sel,pa);
  btext('SEL',23,184,1,'#bfffe0','left',true);
  let mx=52; for(const i of G.selected){ chipIcon(mx,180,14,CHIPS[G.hand[i].id]); mx+=18; }
  if(G.selected.length===0){ jtext('チップ未選択（バスターのみで戦う）',52,189,'#88a8c8',9); }
  btext(G.selected.length+'/5',250,184,1,'#fff','left',true);
  const ok=G.okRect; const okCur=(G.cursor===99);
  if(pa){
    const blink=Math.floor(G.time*4)%2===0;
    px(ok.x,ok.y,ok.w,ok.h, blink?'#a01a6a':'#7a1450');
    ctx.strokeStyle=okCur?'#7df0ff':'#ff5af0'; ctx.lineWidth=2; ctx.strokeRect(ok.x,ok.y,ok.w,ok.h);
    btext('P.A. OK',ok.x+ok.w/2,ok.y+7,1.0,'#ffffff','center',true);
  } else {
    px(ok.x,ok.y,ok.w,ok.h,'#1b6a3a'); ctx.strokeStyle=okCur?'#7df0ff':'#3ad06a'; ctx.lineWidth=okCur?2:1; ctx.strokeRect(ok.x,ok.y,ok.w,ok.h);
    btext('OK [X]',ok.x+ok.w/2,ok.y+6,1.2,'#dfffe8','center',true);
  }
  jtext('Z：選択  ／  X：決定  ／  方向キー：カーソル',VW/2,212,'#7d96b0',9,'center');
}
/* ============================ メイン描画 ============================ */
/* バトル上のオーバーレイ演出：FURY暗転 / PAカットイン（バトル進行は止めない） */
function drawOverlayFx(){
  if(SET.fx && G.furyT>0){
    const lb=liveBoss(); const omega=lb&&lb.type==='omega';
    const a = clamp(G.furyT/0.3, 0, 1);
    ctx.globalAlpha = qa(a*0.55); ctx.fillStyle=omega?'#1a003a':'#3a0000'; ctx.fillRect(0,0,VW,VH); ctx.globalAlpha=1;
    if(Math.floor(G.time*12)%2===0) btext(omega?'OVERLOAD':'FURY MODE', VW/2, VH/2-8, 2.4, omega?'#c79cff':'#ff8a3c', 'center', true);
  }
  if(G.cutin){
    const k = G.cutin.t/G.cutin.life;
    const fade = k<0.12 ? k/0.12 : (k>0.85 ? (1-k)/0.15 : 1); // 出入りフェード
    const bandY = VH/2 - 18;
    ctx.globalAlpha = qa(clamp(fade,0,1));
    px(0, bandY, VW, 36, '#0a0e18');
    px(0, bandY, VW, 2, G.cutin.col); px(0, bandY+34, VW, 2, G.cutin.col);
    btext('PROGRAM ADVANCE', VW/2, bandY+9, 1.0, '#ff6ab0', 'center', true);
    btext(G.cutin.name, VW/2, bandY+20, 1.8, G.cutin.col, 'center', true);
    ctx.globalAlpha = 1;
  }
}
function render(){
  ctx.setTransform(RS,0,0,RS,0,0);   // 論理座標→高解像度バッキングへ写像（毎フレーム適用＝リサイズ後も保証）
  ctx.clearRect(0,0,VW,VH);
  switch(G.state){
    case ST.TITLE: drawTitle(); break;
    case ST.DIFFICULTY: drawDifficulty(); break;
    case ST.HELP: drawHelp(); break;
    case ST.LIBRARY: drawLibrary(); break;
    case ST.CUSTOM: drawCustom(); break;
    case ST.BATTLE:
      drawBattleScene(false); drawOverlayFx();
      // 着弾予告マーカーを最前面に（ダメージ数値/コンボ/カットイン/FURYより上）。揺れは本体と整合。
      ctx.save(); ctx.translate(G._ox||0,G._oy||0); drawStrikeMarkers(); ctx.restore();
      break;
    case ST.RESULT: drawResult(); break;
    case ST.GAMEOVER: drawGameOver(); break;
    case ST.VICTORY:  drawVictory();  break;
    case ST.ACHIEVE:  drawAchieve(); break;
  }
}
/* 実績(メダル)一覧(P4)：未解放もゴール文言を表示して動機づけ。Z/B/タップでタイトルへ復帰。 */
function drawAchieve(){
  drawBG(false);
  btext('ACHIEVEMENTS',VW/2,16,1.8,'#ffe23c','center',true);
  jtext('実績 '+achCount()+' / '+ACHIEVEMENTS.length,VW/2,33,'#9fd0ff',9,'center');
  const x0=26, startY=44, rowh=18;
  for(let i=0;i<ACHIEVEMENTS.length;i++){
    const a=ACHIEVEMENTS[i], got=!!ACH_DONE[a.id], y=startY+i*rowh;
    px(x0-4,y-1,VW-2*(x0-4),rowh-2, got?'#10241a':'#0c1422');           // 行背景
    px(x0,y+1,12,12, got?'#1f5a32':'#161e2a');                          // ステータスボックス
    pframe(x0,y+1,12,12, got?'#7dff9a':'#2a3444',1);
    if(got){ ctx.strokeStyle='#bfffce'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x0+3,y+7); ctx.lineTo(x0+5,y+9); ctx.lineTo(x0+9,y+4); ctx.stroke(); }
    else px(x0+4,y+6,4,2,'#3a4658');                                    // ロック＝灰スロット
    btext(a.name, x0+20, y+2, 1.0, got?'#ffe23c':'#5a6a80','left',true);
    jtext(a.desc, VW-22, y+9, got?'#bfe3ff':'#4f5e74', 8, 'right');
  }
  jtext('Z / B / タップでタイトルへ',VW/2,216,'#8fb0d0',8,'center');
}

/* ============================ ループ ============================ */
let last=performance.now(), acc=0; const STEP=1/60;
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.25) dt=0.25;
  G.time+=dt; G.stateT+=dt; acc+=dt;
  while(acc>=STEP){
    if(G.hitstop>0 && G.state===ST.BATTLE){ G.hitstop-=STEP; acc-=STEP; continue; }
    if(G.state===ST.BATTLE) updateBattle(STEP);
    else if(G.state===ST.RESULT){
      if(G.stateT>1.6 && G.stateT<1.62){} // hold; advance on input or after long delay below
      if(G.stateT>4.0){ advanceAfterResult(); }
    }
    acc-=STEP;
  }
  bgmSchedule();
  render();
  requestAnimationFrame(frame);
}
function advanceAfterResult(){
  if(G.wave>=G.finalWave){ enterVictory(); } // 通常はここに到達しない（保険）
  else startWave(G.wave+1);
}

/* ============================ 入力：キーボード ============================ */
const KD={ 'arrowup':'up','w':'up','arrowdown':'down','s':'down','arrowleft':'left','a':'left','arrowright':'right','d':'right' };
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase(); initAudio();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(e.repeat) return;                  // 押しっぱなしのオートリピートで誤確定/多重発火しない(C-3)
  if(k==='m'){ toggleMute(); return; }
  if(k==='f'){ toggleFx(); return; }   // 画面エフェクト ON/OFF
  if(k==='v'){ cycleShake(); return; } // シェイク強度 強/弱/なし
  if(G.state===ST.TITLE){
    if(k==='z'||k==='enter'||k===' '){ G.state=ST.DIFFICULTY; G.stateT=0; return; }
    if(k==='x'){ G.state=ST.LIBRARY; G.stateT=0; G.libCursor=0; beep(720,0.06); return; }
    if(k==='c'){ G.state=ST.ACHIEVE; G.stateT=0; beep(720,0.06); return; }   // 実績一覧(P4)
    return;
  }
  if(G.state===ST.LIBRARY){
    if(KD[k]){ const d=KD[k]; let c=G.libCursor; const cols=libCols(), n=Object.keys(CHIPS).length;
      if(d==='left'&&c%cols>0) c--; else if(d==='right'&&(c%cols)<cols-1&&c+1<n) c++;
      else if(d==='up'&&c-cols>=0) c-=cols; else if(d==='down'&&c+cols<n) c+=cols;
      G.libCursor=c; beep(620,0.03); return; }
    if(k==='z'||k==='enter'||k===' '||k==='x'||k==='c'||k==='escape'){ clearNewly(); G.state=ST.TITLE; G.stateT=0; beep(520,0.06); }
    return;
  }
  if(G.state===ST.ACHIEVE){
    if(k==='z'||k==='enter'||k===' '||k==='x'||k==='c'||k==='escape'){ G.state=ST.TITLE; G.stateT=0; beep(520,0.06); }
    return;
  }
  if(G.state===ST.DIFFICULTY){
    if(k==='arrowup'||k==='w'||k==='arrowleft'||k==='a'){ G.diffIndex=(G.diffIndex+2)%3; beep(640,0.04); return; }
    if(k==='arrowdown'||k==='s'||k==='arrowright'||k==='d'){ G.diffIndex=(G.diffIndex+1)%3; beep(640,0.04); return; }
    if(k==='e'){ if(EX_UNLOCKED){ G.exMode=!G.exMode; beep(G.exMode?960:520,0.06); beep(G.exMode?1240:380,0.05); } else beep(200,0.1,'square'); return; }
    if(k==='z'||k==='enter'||k===' '){ chooseDifficulty(); } return;
  }
  if(G.state===ST.HELP){ if(k==='z'||k==='enter'||k===' '){ startGame(); } return; }
  // 結果系：表示直後の誤入力を防ぐため 0.4 秒は確定操作をロック(C-3)
  if(G.state===ST.GAMEOVER){ if((k==='z'||k==='enter'||k===' ')&&G.stateT>=0.4){ retryWave(); } return; }
  if(G.state===ST.VICTORY){ if((k==='z'||k==='enter'||k===' ')&&G.stateT>=0.4){ G.state=ST.TITLE; G.stateT=0; } return; }
  if(G.state===ST.RESULT){ if((k==='z'||k==='enter'||k===' ')&&G.stateT>=0.4){ advanceAfterResult(); } return; }
  if(G.state===ST.CUSTOM){
    if(KD[k]){ moveCursor(KD[k]); return; }
    if(k==='z'||k==='enter'){ if(G.cursor===99) confirmCustom(); else toggleSelect(G.cursor); return; }
    if(k==='x'||k==='c'){ confirmCustom(); return; }
    return;
  }
  if(G.state===ST.BATTLE){
    if(KD[k]){ held[KD[k]]=true; return; }
    if(k==='z'){ busterPress(); return; }
    if(k==='x'){ useNextChip(); return; }
    if((k==='c'||k==='enter') && G.customReady){ enterCustom(false); return; }
  }
});
window.addEventListener('keyup',e=>{ const k=e.key.toLowerCase(); if(KD[k]) held[KD[k]]=false; if(k==='z') busterRelease(); });
window.addEventListener('blur',()=>{ held.up=held.down=held.left=held.right=false; busterDown=false; G.p.charging=false; G.p.charge=0; });

function diffMove(dir){ if(dir==='up'||dir==='left') G.diffIndex=(G.diffIndex+2)%3; else if(dir==='down'||dir==='right') G.diffIndex=(G.diffIndex+1)%3; beep(640,0.04); }
function moveCursor(dir){
  let c=G.cursor;
  if(c===99){ if(dir==='up'||dir==='left'){ c=7; } G.cursor=c; return; }
  const r=Math.floor(c/4),col=c%4;
  if(dir==='left'){ if(col>0) c-=1; }
  else if(dir==='right'){ if(col<3) c+=1; }
  else if(dir==='up'){ if(r>0) c-=4; }
  else if(dir==='down'){ if(r===0) c+=4; else c=99; }
  if(c>=G.hand.length && c!==99) c=99;
  G.cursor=c;
}

/* ============================ 入力：タッチ ============================ */
document.querySelectorAll('[data-dir]').forEach(btn=>{
  const dir=btn.getAttribute('data-dir');
  const on=e=>{ e.preventDefault(); initAudio(); if(G.state===ST.DIFFICULTY){ diffMove(dir); return; } if(G.state===ST.CUSTOM){ moveCursor(dir); return; } held[dir]=true; btn.classList.add('on'); };
  const off=e=>{ e.preventDefault(); held[dir]=false; btn.classList.remove('on'); };
  btn.addEventListener('pointerdown',on); btn.addEventListener('pointerup',off);
  btn.addEventListener('pointerleave',off); btn.addEventListener('pointercancel',off);
});
function actHandler(act){
  initAudio();
  if(G.state===ST.LIBRARY){ clearNewly(); G.state=ST.TITLE; G.stateT=0; beep(520,0.06); return; } // 図鑑→タイトル（どのボタンでも）
  if(G.state===ST.ACHIEVE){ G.state=ST.TITLE; G.stateT=0; beep(520,0.06); return; } // 実績→タイトル（どのボタンでも）(P4)
  const rLock = G.stateT<0.4; // 結果系の誤入力ロック
  if(act==='buster'){
    if(G.state===ST.TITLE){ G.state=ST.DIFFICULTY; G.stateT=0; return; }
    if(G.state===ST.DIFFICULTY){ chooseDifficulty(); return; }
    if(G.state===ST.HELP){ startGame(); return; }
    if(G.state===ST.GAMEOVER){ if(!rLock) retryWave(); return; }
    if(G.state===ST.VICTORY){ if(!rLock){ G.state=ST.TITLE; G.stateT=0; } return; }
    if(G.state===ST.RESULT){ if(!rLock) advanceAfterResult(); return; }
    if(G.state===ST.CUSTOM){ if(G.cursor===99) confirmCustom(); else toggleSelect(G.cursor); return; }
    busterPress();
  } else if(act==='chip'){
    if(G.state===ST.TITLE){ G.state=ST.LIBRARY; G.stateT=0; G.libCursor=0; beep(720,0.06); return; } // タイトルで図鑑を開く
    if(G.state===ST.CUSTOM){ confirmCustom(); return; }
    useNextChip();
  } else if(act==='cust'){
    if(G.state===ST.BATTLE && G.customReady){ enterCustom(false); return; }
    if(G.state===ST.CUSTOM){ confirmCustom(); return; }
    if(G.state===ST.TITLE){ G.state=ST.ACHIEVE; G.stateT=0; beep(720,0.06); return; }   // タイトルで実績を開く(P4)
    if(G.state===ST.DIFFICULTY){ chooseDifficulty(); return; }
    if(G.state===ST.HELP){ startGame(); return; }
    if(G.state===ST.GAMEOVER){ if(!rLock) retryWave(); return; }
    if(G.state===ST.VICTORY){ if(!rLock){ G.state=ST.TITLE; G.stateT=0; } return; }
    if(G.state===ST.RESULT){ if(!rLock) advanceAfterResult(); return; }
  }
}
document.querySelectorAll('[data-act]').forEach(btn=>{
  const act=btn.getAttribute('data-act');
  btn.addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio(); btn.classList.add('on'); actHandler(act); });
  const rel=e=>{ e.preventDefault(); btn.classList.remove('on'); if(act==='buster') busterRelease(); };
  btn.addEventListener('pointerup',rel); btn.addEventListener('pointerleave',rel); btn.addEventListener('pointercancel',rel);
});
cv.addEventListener('pointerdown',e=>{
  initAudio();
  const rect=cv.getBoundingClientRect(); const sx=VW/rect.width,sy=VH/rect.height;
  const x=(e.clientX-rect.left)*sx,y=(e.clientY-rect.top)*sy;
  const rLock = G.stateT<0.4;
  if(G.state===ST.LIBRARY){
    for(const cell of libCellRects()){ if(x>=cell.x&&x<=cell.x+cell.w&&y>=cell.y&&y<=cell.y+cell.h){ G.libCursor=cell.i; beep(620,0.03); return; } }
    clearNewly(); G.state=ST.TITLE; G.stateT=0; beep(520,0.06); return; // セル外タップで戻る
  }
  if(G.state===ST.ACHIEVE){ G.state=ST.TITLE; G.stateT=0; beep(520,0.06); return; } // 実績→タイトル(タップ)(P4)
  if(G.state===ST.TITLE){ G.state=ST.DIFFICULTY; G.stateT=0; return; }
  if(G.state===ST.DIFFICULTY){
    const er=exRect();
    if(x>=er.x&&x<=er.x+er.w&&y>=er.y&&y<=er.y+er.h){ // EXトグルは選択せずON/OFFのみ
      if(EX_UNLOCKED){ G.exMode=!G.exMode; beep(G.exMode?960:520,0.06); beep(G.exMode?1240:380,0.05); } else beep(200,0.1,'square'); return; }
    const rects=diffRects();
    for(let i=0;i<rects.length;i++){ const r=rects[i]; if(x>=r.x-2&&x<=r.x+r.w+2&&y>=r.y-2&&y<=r.y+r.h+2){ G.diffIndex=i; chooseDifficulty(); return; } }
    return;
  }
  if(G.state===ST.HELP){ startGame(); return; }
  if(G.state===ST.GAMEOVER){ if(!rLock) retryWave(); return; }
  if(G.state===ST.VICTORY){ if(!rLock){ G.state=ST.TITLE; G.stateT=0; } return; }
  if(G.state===ST.RESULT){ if(!rLock) advanceAfterResult(); return; }
  if(G.state===ST.CUSTOM){
    for(const cr of G.cardRects){ if(x>=cr.x&&x<=cr.x+cr.w&&y>=cr.y&&y<=cr.y+cr.h){ G.cursor=cr.i; toggleSelect(cr.i); return; } }
    const ok=G.okRect; if(ok&&x>=ok.x&&x<=ok.x+ok.w&&y>=ok.y&&y<=ok.y+ok.h){ confirmCustom(); return; }
  }
});

/* ============================ 起動 ============================ */
try{ const mb=document.getElementById('mute'); if(mb) mb.addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio(); toggleMute(); }); }catch(e){}
try{ const fb=document.getElementById('fxbtn'); if(fb) fb.addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio(); toggleFx(); }); }catch(e){}
try{ const sb=document.getElementById('shakebtn'); if(sb) sb.addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio(); cycleShake(); }); }catch(e){}
updateMuteBtn(); updateSetBtns(); // 保存済みの設定値をボタン表示へ反映
fitCanvas();
requestAnimationFrame(frame);

})();
